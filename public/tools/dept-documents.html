<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dept Documents · Mata Web Tools</title>
<style>
  :root {
    --bg:#ffffff; --border:#e5e5e7;
    --text:#1d1d1f; --muted:#6e6e73;
    --hover:#ececee; --active-bg:#1d1d1f; --active-fg:#ffffff;
    --panel:#ffffff; --panel-muted:#fafafa; --input-bg:#ffffff;
    --fs-2xs:9px; --fs-xs:10px; --fs-sm:11px; --fs-base:12px;
    --fs-md:13px; --fs-14:14px; --fs-lg:16px; --fs-18:18px;
    --sp-3:3px; --sp-6:6px; --sp-8:8px; --sp-10:10px;
    --sp-12:12px; --sp-14:14px; --sp-16:16px; --sp-24:24px;
  }
  html[data-theme="dark"] {
    --bg:#0f1115; --border:#2a2d36;
    --text:#e5e7eb; --muted:#9ca3af;
    --hover:#1e222a; --active-bg:#e5e7eb; --active-fg:#0f1115;
    --panel:#14161c; --panel-muted:#181b22; --input-bg:#0f1115;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
       background:var(--bg);color:var(--text);font-size:var(--fs-base);line-height:1.5}
  #loading-wall{display:flex;align-items:center;justify-content:center;
                min-height:100vh;color:var(--muted);font-size:var(--fs-md)}
  #shell{display:none;max-width:860px;margin:0 auto;padding:var(--sp-24)}
  .shell-hd{display:flex;align-items:center;gap:var(--sp-16);margin-bottom:var(--sp-24);flex-wrap:wrap}
  .back-link{font-size:var(--fs-sm);color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:4px}
  .back-link:hover{color:var(--text)}
  .shell-title{font-size:var(--fs-18);font-weight:700;flex:1}
  .user-chip{font-size:var(--fs-sm);color:var(--muted)}
  .muted{color:var(--muted)}
  .empty{color:var(--muted);padding:var(--sp-16);text-align:center}
  .banner{padding:var(--sp-12) var(--sp-16);background:var(--panel-muted);
          border:1px solid var(--border);border-radius:8px;font-size:var(--fs-md);color:var(--muted)}

  /* Dept picker */
  .dept-picker{margin-bottom:var(--sp-16)}
  .dept-picker label{font-size:var(--fs-sm);color:var(--muted);margin-right:var(--sp-8)}
  .dept-picker select{font:inherit;font-size:var(--fs-md);padding:var(--sp-6) var(--sp-10);
                      border:1px solid var(--border);border-radius:6px;background:var(--input-bg);
                      color:var(--text);max-width:100%}

  /* Per-dept Documents CSS (verbatim from Panso index.html ~L1134) */
  .docs-section{max-width:820px}
  .docs-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:6px}
  .docs-row{display:grid;grid-template-columns:1fr minmax(0,200px);gap:12px;
            align-items:center;padding:var(--sp-10) var(--sp-14);
            background:var(--panel);border:1px solid var(--border);
            border-radius:8px;font-size:var(--fs-md)}
  .docs-row .docs-title{font-weight:500;color:var(--text);text-decoration:none;
                         word-break:break-word}
  .docs-row .docs-title:hover{text-decoration:underline}
  .docs-row .docs-url{font-size:var(--fs-sm);white-space:nowrap;overflow:hidden;
                       text-overflow:ellipsis;color:var(--muted)}
  .docs-empty{padding:var(--sp-14);text-align:center;font-size:var(--fs-md);color:var(--muted)}

  /* Mobile: stack columns on narrow screens */
  @media(max-width:520px){
    .docs-row{grid-template-columns:1fr}
    .docs-row .docs-url{white-space:normal;word-break:break-all}
    .dept-picker select{max-width:calc(100vw - 2*var(--sp-24))}
  }
</style>
</head>
<body>
<div id="loading-wall">Loading…</div>
<div id="shell">
  <div class="shell-hd">
    <a class="back-link" href="/">← Back</a>
    <div class="shell-title">Dept Documents</div>
    <div class="user-chip" id="user-chip"></div>
  </div>
  <div id="dept-picker-wrap"></div>
  <div id="dept-body"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
function esc(s) {
  return (s || '').toString().replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let _cachedToken = null, _tokenExpiry = 0, _currentUser = null;
async function getToken() {
  if (_currentUser && Date.now() < _tokenExpiry - 60000) return _cachedToken;
  if (!_currentUser) return null;
  _cachedToken = await _currentUser.getIdToken(true);
  _tokenExpiry = Date.now() + 55 * 60 * 1000;
  return _cachedToken;
}
async function apiFetch(path) {
  const tok  = await getToken();
  const hdrs = tok ? { 'Authorization': 'Bearer ' + tok } : {};
  return fetch(path, { headers: hdrs }).then(r => r.json());
}

// Render the documents list for a given dept name.
// Verbatim list-render + empty-state from Panso renderDeptDocumentsBody (L5510–5535),
// omitting the add form and delete/rename buttons (read-only per D11).
async function loadDocs(name) {
  const body = document.getElementById('dept-body');
  body.innerHTML = '<div class="empty">Loading…</div>';
  try {
    const data = await apiFetch('/api/dept/documents?name=' + encodeURIComponent(name));
    if (data.error) {
      body.innerHTML = '<div class="banner">' + esc(data.error) + '</div>';
      return;
    }
    const docs = (data && data.items) || [];
    const rows = docs.length
      ? docs.map(d =>
          '<li class="docs-row" data-id="' + esc(d.id || '') + '">' +
            '<a class="docs-title" href="' + esc(d.url) + '" target="_blank" rel="noopener">' +
              esc(d.title || d.url) +
            '</a>' +
            '<span class="docs-url muted" title="' + esc(d.url) + '">' +
              esc((d.url || '').replace(/^https?:\/\/(www\.)?/, '').slice(0, 80)) +
            '</span>' +
          '</li>').join('')
      : '<li class="docs-empty">No documents saved yet.</li>';
    body.innerHTML =
      '<div class="docs-section">' +
        '<ul class="docs-list">' + rows + '</ul>' +
      '</div>';
  } catch (e) {
    body.innerHTML = '<div class="banner">Error: ' + esc(String(e)) + '</div>';
  }
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
(async function () {
  let fbCfg;
  try {
    fbCfg = await fetch('/api/firebase-config').then(r => r.json());
  } catch (e) {
    document.getElementById('loading-wall').textContent = 'Could not reach server.';
    return;
  }
  firebase.initializeApp(fbCfg);
  firebase.auth().onAuthStateChanged(async function(user) {
    if (!user) { window.location.href = '/'; return; }
    _currentUser = user;
    document.getElementById('user-chip').textContent = user.email;

    // Fetch /api/me to determine dept grants
    let me;
    try {
      me = await apiFetch('/api/me');
    } catch (e) {
      document.getElementById('loading-wall').textContent = 'Could not reach server.';
      return;
    }

    document.getElementById('loading-wall').style.display = 'none';
    document.getElementById('shell').style.display        = 'block';

    // Determine which dept(s) the user can see
    const isAdmin = me.is_admin;
    const grants  = me.grants || [];
    const deptGrants = grants
      .filter(g => g.startsWith('dept::'))
      .map(g => g.slice('dept::'.length));

    let availableDepts = [];
    if (isAdmin) {
      // Admin: fetch all departments from /api/me subsidiary or load dept list
      // For simplicity, show a free-text fallback or load dept list
      try {
        const deptData = await apiFetch('/api/departments');
        if (deptData && deptData.items) {
          availableDepts = deptData.items.map(d => d.name || d).filter(Boolean);
        }
      } catch (_) {}
      if (!availableDepts.length) availableDepts = deptGrants;
    } else {
      availableDepts = deptGrants;
    }

    if (!availableDepts.length) {
      document.getElementById('dept-body').innerHTML =
        '<div class="banner">No department assigned to your account. Contact ryan@mata.ph to request access.</div>';
      return;
    }

    if (availableDepts.length === 1) {
      // Single dept — no picker needed
      loadDocs(availableDepts[0]);
    } else {
      // Multiple depts — show a picker
      const pickerWrap = document.getElementById('dept-picker-wrap');
      const opts = availableDepts.map(n =>
        '<option value="' + esc(n) + '">' + esc(n) + '</option>').join('');
      pickerWrap.innerHTML =
        '<div class="dept-picker">' +
          '<label for="dept-select">Department:</label>' +
          '<select id="dept-select">' + opts + '</select>' +
        '</div>';
      const sel = document.getElementById('dept-select');
      sel.addEventListener('change', () => loadDocs(sel.value));
      loadDocs(availableDepts[0]);
    }
  });
})();
</script>
</body>
</html>
