<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Incentive Calculator · Mata Web Tools</title>
<style>
  /* ── Design-system tokens (mirrored from Panso) ── */
  :root {
    --bg:#ffffff; --border:#e5e5e7;
    --text:#1d1d1f; --muted:#6e6e73;
    --hover:#ececee; --active-bg:#1d1d1f; --active-fg:#ffffff;
    --good:#16a34a; --warn:#ca8a04;
    --panel:#ffffff; --panel-muted:#fafafa; --input-bg:#ffffff;
    --fs-2xs:9px; --fs-xs:10px; --fs-10-5:10.5px;
    --fs-sm:11px; --fs-base:12px; --fs-md:13px; --fs-14:14px;
    --fs-15:15px; --fs-lg:16px; --fs-18:18px; --fs-20:20px;
    --fs-xl:22px; --fs-9-5:9.5px;
    --sp-2:2px; --sp-3:3px; --sp-4:4px; --sp-5:5px;
    --sp-6:6px; --sp-7:7px; --sp-8:8px; --sp-9:9px;
    --sp-10:10px; --sp-12:12px; --sp-14:14px; --sp-16:16px;
    --sp-18:18px; --sp-20:20px; --sp-22:22px; --sp-24:24px;
    --sp-28:28px; --sp-30:30px; --sp-32:32px; --sp-40:40px;
  }
  html[data-theme="dark"] {
    --bg:#0f1115; --border:#2a2d36;
    --text:#e5e7eb; --muted:#9ca3af;
    --hover:#1e222a; --active-bg:#e5e7eb; --active-fg:#0f1115;
    --good:#22c55e; --warn:#eab308;
    --panel:#14161c; --panel-muted:#181b22; --input-bg:#0f1115;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
       background:var(--bg);color:var(--text);font-size:var(--fs-base);line-height:1.5}
  #loading-wall{display:flex;align-items:center;justify-content:center;
                min-height:100vh;color:var(--muted);font-size:var(--fs-md)}
  #shell{display:none;max-width:980px;margin:0 auto;padding:var(--sp-24) var(--sp-24)}
  .shell-hd{display:flex;align-items:center;gap:var(--sp-16);margin-bottom:var(--sp-24);flex-wrap:wrap}
  .back-link{font-size:var(--fs-sm);color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:4px}
  .back-link:hover{color:var(--text)}
  .shell-title{font-size:var(--fs-18);font-weight:700;flex:1}
  .user-chip{font-size:var(--fs-sm);color:var(--muted)}
  .data-freshness-chip{font-size:var(--fs-sm);color:var(--muted);white-space:nowrap;padding:var(--sp-3) var(--sp-8);background:var(--panel-muted);border:1px solid var(--border);border-radius:999px}
  /* ── Period picker container ── */
  .period-bar{display:flex;gap:var(--sp-12);align-items:center;flex-wrap:wrap;
              margin-bottom:var(--sp-24);padding:var(--sp-12) var(--sp-16);
              background:var(--panel-muted);border:1px solid var(--border);border-radius:8px}
  /* ── Custom select chevron (SVG dropdown arrow, ported from Panso) ── */
  select{appearance:none;-webkit-appearance:none;-moz-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6' fill='none' stroke='%236e6e73' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><path d='M1 1l4 4 4-4'/></svg>");
    background-repeat:no-repeat;background-position:right 12px center;
    background-size:10px 6px;padding-right:30px}
  select::-ms-expand{display:none}
  html[data-theme="dark"] select{
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6' fill='none' stroke='%239ca3af' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><path d='M1 1l4 4 4-4'/></svg>");
    background-size:10px 6px}
  /* ── Period picker (ported verbatim from Panso) ── */
  .pp-tabs{display:inline-flex;align-items:stretch;background:#f3f3f5;border-radius:8px;padding:var(--sp-2);border:1px solid var(--border);height:36px;box-sizing:border-box}
  .pp-tab{border:0;background:transparent;font:inherit;font-size:var(--fs-base);padding:0 var(--sp-10);border-radius:6px;cursor:pointer;color:var(--muted);display:inline-flex;align-items:center}
  .pp-tab:hover{color:var(--text)}
  .pp-tab.active{background:#fff;color:var(--text);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,0.08)}
  .pp-tab:focus-visible{outline:2px solid var(--active-bg);outline-offset:2px}
  .pp-tab:not(.active):hover{background:rgba(0,0,0,0.04);color:var(--text)}
  #pp-value{padding:0 var(--sp-10);font:inherit;font-size:var(--fs-base);line-height:32px;height:100%;border:1px solid var(--border);border-radius:8px;background:#fff;min-width:180px;box-sizing:border-box}
  .pp-cluster{display:inline-flex;align-items:stretch;background:#f3f3f5;border:1px solid var(--border);border-radius:8px;padding:var(--sp-2);gap:2px;height:36px;box-sizing:border-box}
  .pp-cluster > select,.pp-cluster > .pp-btn{font:inherit;font-size:var(--fs-base);line-height:1;background:transparent;border:0;color:var(--muted);cursor:pointer;border-radius:6px;padding:0 var(--sp-10);font-weight:600;letter-spacing:0.2px;display:inline-flex;align-items:center}
  .pp-cluster > select{background-color:#fff;color:var(--text);padding:0 28px 0 10px;min-width:160px;border:1px solid var(--border);height:100%;box-sizing:border-box;background-position:right 10px center;background-size:10px 6px}
  .pp-cluster > .pp-btn#btn-pp-prev,.pp-cluster > .pp-btn#btn-pp-next{background:#fff;border:1px solid var(--border);font-size:var(--fs-lg);font-weight:700;color:var(--text);padding:0 var(--sp-10);min-width:28px}
  .pp-cluster > .pp-btn#btn-pp-prev:hover:not(:disabled),.pp-cluster > .pp-btn#btn-pp-next:hover:not(:disabled){background:var(--text);color:#fff;border-color:var(--text)}
  .pp-cluster > .pp-btn:hover:not(:disabled){background:#fff;color:var(--text)}
  .pp-cluster > .pp-btn:disabled{opacity:0.35;cursor:default}
  .pp-cluster > .pp-btn-today:hover:not(:disabled){background:var(--text);color:#fff}
  /* Dark mode overrides for pp- components */
  html[data-theme="dark"] .pp-tabs,html[data-theme="dark"] .pp-cluster{background:var(--panel-muted);border-color:var(--border)}
  html[data-theme="dark"] .pp-cluster > select,html[data-theme="dark"] #pp-value{background:var(--input-bg);color:var(--text);border-color:var(--border)}
  html[data-theme="dark"] .pp-cluster > .pp-btn{background:var(--panel);color:var(--text);border-color:var(--border)}
  html[data-theme="dark"] .pp-cluster > .pp-btn#btn-pp-prev,html[data-theme="dark"] .pp-cluster > .pp-btn#btn-pp-next{background:var(--panel);color:var(--text);border-color:var(--border)}
  html[data-theme="dark"] .pp-tab.active{background:var(--panel);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,0.35)}
  html[data-theme="dark"] .pp-cluster > .pp-btn#btn-pp-next:hover:not(:disabled),html[data-theme="dark"] .pp-cluster > .pp-btn-today:hover:not(:disabled){background:var(--active-bg);color:var(--active-fg);border-color:var(--active-bg)}
  .ic-wrap{padding:0}
  .ic-hd{margin-bottom:var(--sp-12)}
  .ic-title{font-size:var(--fs-18);font-weight:700}
  .ic-how code{font-size:var(--fs-sm);font-family:ui-monospace,monospace}
  .coming-soon-banner{padding:var(--sp-12) var(--sp-16);background:#f3f4f6;
    border:1px solid var(--border);border-radius:8px;font-size:var(--fs-md);color:var(--muted)}
  .muted{color:var(--muted)}
  .empty{color:var(--muted);padding:var(--sp-16);text-align:center}
  html[data-theme="dark"] .coming-soon-banner{background:var(--panel-muted);border-color:var(--border)}
  html[data-theme="dark"] select,html[data-theme="dark"] input{
    background:var(--input-bg);color:var(--text);border-color:var(--border)}
  /* ── Steps grid: inputs align on same row ── */
  .ic-steps{display:grid;grid-template-columns:3fr 2fr;grid-template-rows:auto auto;
            column-gap:20px;row-gap:6px;margin-top:12px}
  /* Card layout — hidden on desktop, shown on mobile */
  #ic-cards { display: none; }
  /* ── Incentive column — visually distinct from base/paid (task 13) ── */
  /* Applied to the TH header, TD body cells, and tfoot total for the Incentive column. */
  .ic-inc-col { border-left: 3px solid var(--good) !important; background: #f0fdf4; }
  html[data-theme="dark"] .ic-inc-col { background: rgba(34,197,94,0.08); }

  /* ── Mobile responsive (≤ 640px) ── */
  @media (max-width: 640px) {
    #shell {
      padding: var(--sp-16) var(--sp-16);
    }
    .shell-hd {
      gap: var(--sp-8);
      margin-bottom: var(--sp-16);
    }
    .period-bar {
      gap: var(--sp-8);
      padding: var(--sp-10) var(--sp-12);
    }
    #pp-value { min-width: 0 !important; width: 100%; box-sizing: border-box; }
    .pp-cluster { flex-wrap: wrap; gap: 4px; }
    .pp-tabs { flex-wrap: wrap; }
    /* Stack Steps to a single column */
    .ic-steps {
      grid-template-columns: 1fr;
      row-gap: 10px;
    }
    /* Re-order the 4 grid children for logical single-column flow */
    .ic-steps > div:nth-child(1) { order: 1; } /* Step 1 label + sub filters */
    .ic-steps > div:nth-child(2) { order: 3; } /* Step 2 label */
    .ic-steps > div:nth-child(3) { order: 2; } /* Project search input */
    .ic-steps > div:nth-child(4) { order: 4; } /* Multiplier + Amount + Clear */
    /* Summary bar: stack the total below the counts on very narrow screens */
    .ic-summary {
      gap: 12px;
    }
    .ic-summary > div:last-of-type {
      margin-left: 0;
      text-align: left;
    }
    /* Hide table, show cards */
    #ic-table-wrap { display: none !important; }
    #ic-cards      { display: block; }

    .ic-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: var(--sp-12) var(--sp-14);
      margin-bottom: var(--sp-8);
      background: var(--panel);
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: var(--sp-8) var(--sp-10);
      align-items: start;
    }
    .ic-card.ineligible { opacity: 0.55; }
    .ic-card-cb   { grid-column: 1; grid-row: 1 / 3; display: flex; align-items: flex-start; padding-top: 3px; }
    .ic-card-body { grid-column: 2; }
    .ic-card-name { font-weight: 600; font-size: var(--fs-md); }
    .ic-card-email { font-size: var(--fs-sm); color: var(--muted); margin-bottom: var(--sp-6); }
    .ic-card-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--sp-4) var(--sp-12);
      font-size: var(--fs-sm);
    }
    .ic-card-field label { color: var(--muted); display: block; }
    .ic-card-field value { font-weight: 600; }
    .ic-card-incentive { background: #f0fdf4; border-radius: 6px; padding: 4px 6px; margin-top: 2px; }
    .ic-card-incentive value { color: var(--good); font-size: var(--fs-md); font-weight: 700; }
    html[data-theme="dark"] .ic-card-incentive { background: rgba(34,197,94,0.08); }
  }
</style>
</head>
<body>
<div id="loading-wall">Loading…</div>

<div id="shell">
  <div class="shell-hd">
    <a class="back-link" href="/">← Tools</a>
    <div class="shell-title">MG-Finance · Incentive Calculator</div>
    <div class="user-chip" id="user-chip"></div>
    <div class="data-freshness-chip" id="data-freshness" title="When the data directory was last updated (sync time)">Data as of —</div>
  </div>

  <!-- ===== Shared period picker (ported verbatim from Panso) — keep in sync with Intern Allowance Matrix ===== -->
  <div class="period-bar" id="period-picker">
    <div class="pp-tabs" role="tablist">
      <button type="button" class="pp-tab active" data-pp-type="payperiod" role="tab" aria-selected="true">Pay-period</button>
      <button type="button" class="pp-tab" data-pp-type="week" role="tab" aria-selected="false">Week</button>
      <button type="button" class="pp-tab" data-pp-type="month" role="tab" aria-selected="false">Month</button>
    </div>
    <div class="pp-cluster" role="group" aria-label="Period navigation">
      <select id="pp-value" aria-label="Select period"></select>
      <button type="button" class="pp-btn" id="btn-pp-prev" title="Previous period" aria-label="Previous period">‹</button>
      <button type="button" class="pp-btn" id="btn-pp-next" title="Next period" aria-label="Next period">›</button>
      <button type="button" class="pp-btn pp-btn-today" id="btn-today" title="Snap to the period containing today">Today</button>
    </div>
  </div>
  <!-- ===== / Shared period picker ===== -->

  <div id="dept-body"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
function esc(s) {
  return (s || '').toString().replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtPHP(n) {
  const f = (+n || 0).toFixed(2).split('.');
  f[0] = f[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return '₱' + f[0] + '.' + f[1];
}

let _cachedToken = null;
let _tokenExpiry = 0;
let _currentUser = null;

async function getToken() {
  if (_currentUser && Date.now() < _tokenExpiry - 60000) return _cachedToken;
  if (!_currentUser) return null;
  _cachedToken = await _currentUser.getIdToken(true);
  _tokenExpiry = Date.now() + 55 * 60 * 1000;
  return _cachedToken;
}

async function apiFetch(path) {
  const tok  = await getToken();
  const hdrs = tok ? { 'Authorization': 'Bearer ' + tok } : {};
  const resp = await fetch(path, { headers: hdrs });
  return resp.json();
}

const STATE = { period: { type: 'payperiod', value: '' }, periods: {} };

function currentPeriodParam() {
  return 'type=' + encodeURIComponent(STATE.period.type) +
         '&value=' + encodeURIComponent(STATE.period.value || '');
}
function currentPeriodLabel() {
  const list = STATE.periods[STATE.period.type] || [];
  const hit  = list.find(p => p.value === STATE.period.value);
  return hit ? hit.label : (STATE.period.value || '');
}

// ===== Shared period picker (ported verbatim from Panso) — keep in sync with Intern Allowance Matrix =====
function refreshPeriodPicker() {
  // Tab active state
  document.querySelectorAll('.pp-tab').forEach(btn => {
    const on = btn.dataset.ppType === STATE.period.type;
    btn.classList.toggle('active', on);
    btn.setAttribute('aria-selected', on ? 'true' : 'false');
  });
  // Value dropdown
  const list = STATE.periods[STATE.period.type] || [];
  const sel  = document.getElementById('pp-value');
  if (!list.length) { sel.innerHTML = '<option>No data</option>'; sel.disabled = true; return; }
  sel.disabled = false;
  // Today button: enabled when there is a period and we are not already on today's period.
  const todayBtn = document.getElementById('btn-today');
  if (todayBtn) {
    const todayIso = new Date().toISOString().slice(0, 10);
    const now    = list.find(p => p.start <= todayIso && todayIso <= p.end);
    const target = now || list[list.length - 1];
    todayBtn.disabled = !target || STATE.period.value === target.value;
    todayBtn.title = now
      ? ('Snap to ' + (now.label || now.value))
      : (target ? ('Today has no data. Snap to latest (' + (target.label || target.value) + ')') : 'No periods available');
  }
  // Prev/next arrows: disabled at list boundaries.
  const idx     = list.findIndex(p => p.value === STATE.period.value);
  const prevBtn = document.getElementById('btn-pp-prev');
  const nextBtn = document.getElementById('btn-pp-next');
  if (prevBtn) { prevBtn.disabled = idx <= 0; prevBtn.title = idx > 0 ? 'Go to ' + (list[idx-1].label || list[idx-1].value) : 'At the start'; }
  if (nextBtn) { nextBtn.disabled = idx < 0 || idx >= list.length - 1; nextBtn.title = (idx >= 0 && idx < list.length - 1) ? 'Go to ' + (list[idx+1].label || list[idx+1].value) : 'At the latest'; }
  sel.innerHTML = list.slice().reverse().map(p =>
    '<option value="' + esc(p.value) + '"' + (p.value === STATE.period.value ? ' selected' : '') + '>' + esc(p.label) + '</option>'
  ).join('');
}

function stepPeriod(delta) {
  const list = STATE.periods[STATE.period.type] || [];
  const idx  = list.findIndex(p => p.value === STATE.period.value);
  if (idx < 0) return;
  const nextIdx = idx + delta;
  if (nextIdx < 0 || nextIdx >= list.length) return;
  STATE.period = {type: STATE.period.type, value: list[nextIdx].value};
  refreshPeriodPicker();
  _incentiveState.lastItems = null;
  renderFinanceIncentive('MG - Finance');
}
// ===== / Shared period picker =====

let _incentiveState = {
  project:  '',
  projects: [],       // multi-select
  multiplier: 1.5,
  amount: 0,
  lastChanged: 'multiplier',
  lastItems: null,
  lastProject: '',
  lastMultiplier: null,
  subFilter: {MT: true, E: true, MCS: true, TSF: true},
};

async function renderFinanceIncentive(name) {
  const body = document.getElementById('dept-body');
  if (!body) return;
  const projRes  = await apiFetch('/api/projects?year=' + new Date().getFullYear());
  const allProjs = (projRes && projRes.items) || [];
  const seen = new Set();
  const projs = [];
  for (const p of allProjs) {
    const k = (p.project || '').toLowerCase();
    if (!k || seen.has(k)) continue;
    seen.add(k);
    projs.push(p);
  }

  window._icProjList = projs
    .filter(p => {
      const sub = (p.subsidiary || '').trim();
      return sub ? !!_incentiveState.subFilter[sub] : false;
    })
    .sort((a, b) =>
      new Intl.Collator(undefined, {numeric: true, sensitivity: 'base'})
        .compare(a.project, b.project));

  // Pill base style shared by ALL/NONE and subsidiary buttons
  const _P = 'padding:2px 8px;border-radius:999px;cursor:pointer;font-size:12px;font-weight:600;border:1px ';
  const _SC = {MT:'#f97316', E:'#3b82f6', MCS:'#a855f7', TSF:'#f43f5e'};

  body.innerHTML =
    '<div class="ic-wrap">' +
      '<div class="ic-hd">' +
        '<h2 class="ic-title">Incentive Calculator <span class="muted" style="font-weight:400;font-size:var(--fs-14)">· ' + esc(currentPeriodLabel()) + '</span></h2>' +
        '<div class="ic-how" style="margin-top:4px;padding:var(--sp-8) var(--sp-12);background:var(--panel);border:1px solid var(--border);border-radius:8px;font-size:var(--fs-base);color:var(--muted)">' +
          '<code style="font-size:var(--fs-sm)">incentive = hourly_rate × hours × (multiplier − 1)</code>' +
          ' · 1× = base only (no incentive); 1.5× = +50%; 2× = double pay, 3x = triple pay. Only FTEs qualify. Multiplier is applied at set schedule.' +
        '</div>' +
      '</div>' +
      '<div class="ic-steps">' +

        // ── Row 1, Col 1: Step 1 label + subsidiary filter buttons ──
        '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">' +
          '<div style="font-size:var(--fs-sm);font-weight:700;color:var(--muted)">Step 1 · Project</div>' +
          '<button type="button" class="ic-bulk" data-action="select-all" style="' + _P + 'dashed var(--border);color:var(--muted);background:transparent">ALL</button>' +
          ['MT','E','MCS','TSF'].map(function(s) {
            var c  = _SC[s];
            var on = _incentiveState.subFilter[s];
            return '<button type="button" class="ic-sub-btn" data-sub="' + s + '" style="' + _P + 'solid ' +
              (on ? c + ';background:' + c + ';color:#fff' : 'var(--border);background:transparent;color:var(--text)') +
              '">' + s + '</button>';
          }).join('') +
          '<button type="button" class="ic-bulk" data-action="clear-all" style="' + _P + 'dashed var(--border);color:var(--muted);background:transparent">NONE</button>' +
        '</div>' +

        // ── Row 1, Col 2: Step 2 label ──
        '<div style="font-size:var(--fs-sm);font-weight:700;color:var(--muted)">Step 2 · Incentive level</div>' +

        // ── Row 2, Col 1: Project search input ──
        '<div style="position:relative">' +
          '<div style="font-size:var(--fs-sm);margin-bottom:4px;visibility:hidden;user-select:none" aria-hidden="true">Project</div>' +
          '<input type="text" id="ic-project-input" autocomplete="off" placeholder="Type to search, or click to browse…" style="width:100%;padding:var(--sp-9) var(--sp-30) var(--sp-9) var(--sp-12);border:1px solid var(--border);border-radius:8px;background:var(--input-bg);color:var(--text);font:inherit;box-sizing:border-box">' +
          '<button type="button" id="ic-project-clear" title="Clear" style="position:absolute;right:6px;bottom:7px;padding:2px 10px;background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:20px;line-height:1">×</button>' +
          '<div id="ic-project-dropdown" style="display:none;position:absolute;top:44px;left:0;right:0;max-height:360px;overflow-y:auto;background:var(--panel);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:1000;padding:0"></div>' +
        '</div>' +

        // ── Row 2, Col 2: Multiplier + Amount + Clear ──
        '<div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">' +
          '<div style="flex:1;min-width:110px">' +
            '<label class="muted" style="display:block;font-size:var(--fs-sm);margin-bottom:4px">Multiplier</label>' +
            '<div style="display:flex;align-items:center;gap:4px">' +

              '<span style="font-weight:600;font-size:var(--fs-14);flex-shrink:0">×</span>' +

          '<div style="flex:1;min-width:120px">' +

            '<div style="display:flex;align-items:center;gap:4px">' +
              '<span style="font-weight:600;font-size:var(--fs-14);flex-shrink:0">₱</span>' +
              '<input type="number" id="ic-amount" value="' + (_incentiveState.amount || 0).toFixed(2) + '" step="100" min="0" title="Target total bonus to disburse" style="width:100%;padding:var(--sp-8);border:1px solid var(--border);border-radius:6px;background:var(--input-bg);color:var(--text);font:inherit">' +
            '</div>' +
          '</div>' +
          '<button type="button" id="ic-clear-all-btn" style="padding:var(--sp-8) var(--sp-12);background:transparent;color:var(--text);border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0">Clear</button>' +
        '</div>' +

      '</div>' +
      '<div id="ic-result" style="margin-top:16px"></div>' +
    '</div>';

  // ── Subsidiary filter button listeners ──
  document.querySelectorAll('.ic-sub-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      _incentiveState.subFilter[btn.dataset.sub] = !_incentiveState.subFilter[btn.dataset.sub];
      renderFinanceIncentive(name);
    });
  });
  document.querySelectorAll('.ic-bulk').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var v = (btn.dataset.action === 'select-all');
      ['MT','E','MCS','TSF'].forEach(function(s) { _incentiveState.subFilter[s] = v; });
      renderFinanceIncentive(name);
    });
  });

  var ttInput    = document.getElementById('ic-project-input');
  var ttDropdown = document.getElementById('ic-project-dropdown');
  var ttClear    = document.getElementById('ic-project-clear');

  var SUB_COLORS  = {MT:'#f97316', E:'#3b82f6', MCS:'#a855f7', TSF:'#f43f5e', MG:'#16a34a'};
  var SUB_ORDER   = ['MT', 'E', 'MCS', 'TSF'];
  var SUB_LABELS  = {MT:'Mata Technologies', E:'Ehrlich · Teams',
                     MCS:'Mata Creative Services', TSF:'The Sandbox Foundation'};
  var SUB_DEFAULT_CLIENTS = {
    MT:  ['Mata Technologies', 'MT'],
    E:   ['Teams (E)', 'Ehrlich'],
    MCS: ['Services (MCS)', 'Mata Creative Services', 'MCS'],
    TSF: ['TSF', 'The Sandbox Foundation', 'Sandbox Foundation'],
  };

  function updateInputDisplay() {
    var n = _incentiveState.projects.length;
    if (n === 0) {
      ttInput.value = '';
    } else if (n === 1) {
      ttInput.value = _incentiveState.projects[0];
    } else {
      ttInput.value = n + ' projects selected';
    }
  }

  function renderDropdown(query) {
    var q   = (query || '').trim().toLowerCase();
    var all = (window._icProjList || []);
    var selSet = {};
    _incentiveState.projects.forEach(function(p) { selSet[p.toLowerCase()] = true; });

    var matches = all.filter(function(p) {
      if (!q) return true;
      var hay = (p.project + ' ' + (p.client || '') + ' ' + (p.subsidiary || '')).toLowerCase();
      return hay.includes(q);
    });

    if (!matches.length) {
      ttDropdown.innerHTML = '<div style="padding:var(--sp-14) var(--sp-16);color:var(--muted);font-size:var(--fs-md);text-align:center">No matching projects.</div>';
      ttDropdown.style.display = 'block';
      return;
    }

    var grouped = {};
    matches.forEach(function(p) {
      var sub = (p.subsidiary || '').trim();
      if (!SUB_ORDER.includes(sub)) return;
      if (!grouped[sub]) grouped[sub] = [];
      grouped[sub].push(p);
    });

    var groupsHtml = SUB_ORDER.filter(function(s) { return grouped[s] && grouped[s].length; }).map(function(sub) {
      var color      = SUB_COLORS[sub];
      var list       = grouped[sub];
      var defClients = SUB_DEFAULT_CLIENTS[sub] || [];
      var rows = list.map(function(p) {
        var clientStr  = (p.client || '').trim();
        var showClient = clientStr && !defClients.some(function(d) { return d.toLowerCase() === clientStr.toLowerCase(); });
        var clientHtml = showClient ? '<span class="muted" style="font-size:var(--fs-sm);margin-left:6px">· ' + esc(clientStr) + '</span>' : '';
        var isSel      = !!selSet[(p.project || '').toLowerCase()];
        var checkHtml  = '<span style="width:16px;flex-shrink:0;text-align:center;font-size:var(--fs-md);color:' + color + '">' + (isSel ? '✓' : '') + '</span>';
        var rowBg      = isSel ? 'background:var(--hover)' : '';
        return '<div class="ic-tt-row" data-project="' + esc(p.project) + '" style="display:flex;align-items:baseline;gap:6px;padding:var(--sp-6) var(--sp-14) var(--sp-6) var(--sp-10);cursor:pointer;font-size:var(--fs-md);line-height:1.3;' + rowBg + '">' +
          checkHtml +
          '<span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(p.project) + clientHtml + '</span>' +
          '<span class="muted" style="font-size:var(--fs-sm);font-variant-numeric:tabular-nums;min-width:54px;text-align:right">' + (p.total_hours || 0).toFixed(1) + 'h</span>' +
        '</div>';
      }).join('');
      return '<div class="ic-tt-group">' +
        '<div style="position:sticky;top:0;z-index:2;background:var(--panel-muted);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:var(--sp-6) var(--sp-14);font-size:var(--fs-sm);font-weight:700;color:' + color + ';display:flex;align-items:center;gap:8px">' +
          '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + color + '"></span>' +
          '<span>' + sub + ' &middot; ' + esc(SUB_LABELS[sub] || sub) + '</span>' +
          '<span class="muted" style="margin-left:auto;font-weight:500">' + list.length + '</span>' +
        '</div>' +
        '<div>' + rows + '</div>' +
      '</div>';
    }).join('');

    ttDropdown.innerHTML = groupsHtml;
    ttDropdown.querySelectorAll('.ic-tt-row').forEach(function(row) {
      // Use 'click' (fires on both mouse and touch) instead of 'mousedown'
      row.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        var proj = row.dataset.project;
        var idx  = _incentiveState.projects.indexOf(proj);
        if (idx === -1) {
          _incentiveState.projects.push(proj);
        } else {
          _incentiveState.projects.splice(idx, 1);
        }
        _incentiveState.project = _incentiveState.projects[0] || '';
        renderDropdown(ttInput._searchVal || '');
        triggerCalc();
      });
      // Mouse hover (desktop only — ignored on touch, that's fine)
      row.addEventListener('mouseenter', function() {
        if (!_incentiveState.projects.includes(row.dataset.project))
          row.style.background = 'var(--hover)';
      });
      row.addEventListener('mouseleave', function() {
        if (!_incentiveState.projects.includes(row.dataset.project))
          row.style.background = '';
      });
    });
    ttDropdown.style.display = 'block';
  }

  // On focus: clear display value, show full dropdown (search mode)
  ttInput.addEventListener('focus', function() {
    ttInput._searchVal = '';
    ttInput.value = '';
    renderDropdown('');
  });
  // On input: filter dropdown
  ttInput.addEventListener('input', function() {
    ttInput._searchVal = ttInput.value;
    renderDropdown(ttInput.value);
  });
  // On blur: hide dropdown, restore display
  ttInput.addEventListener('blur', function() {
    setTimeout(function() {
      ttDropdown.style.display = 'none';
      ttInput._searchVal = '';
      updateInputDisplay();
    }, 250);  // was 150 — increased for click latency on slow devices
  });
  ttInput.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { ttDropdown.style.display = 'none'; ttInput.blur(); }
    else if (e.key === 'Enter') { e.preventDefault(); ttDropdown.style.display = 'none'; ttInput.blur(); }
  });

  ttClear.addEventListener('click', function() {
    _incentiveState.projects = [];
    _incentiveState.project  = '';
    ttInput.value = '';
    ttInput._searchVal = '';
    document.getElementById('ic-result').innerHTML = '';
    ttInput.focus();
    renderDropdown('');
  });

  document.getElementById('ic-clear-all-btn').addEventListener('click', function() {

    _incentiveState.amount     = 0;
    _incentiveState.lastChanged = 'multiplier';
    _incentiveState.lastItems   = null;
    _incentiveState.lastProject = '';
    document.getElementById('ic-result').innerHTML = '';
    ttInput.value = '';
    ttInput._searchVal = '';
    document.getElementById('ic-multiplier').value = '1.50';
    document.getElementById('ic-amount').value     = '0.00';
  });

  async function triggerCalc() {
    var projects = _incentiveState.projects;
    if (!projects.length) {
      document.getElementById('ic-result').innerHTML =
        '<div class="coming-soon-banner">Pick a project first.</div>';
      return;
    }
    document.getElementById('ic-result').innerHTML = '<div class="empty">Calculating…</div>';

    var suffix  = '&multiplier=1.0&' + currentPeriodParam();
    var results = await Promise.all(
      projects.map(function(proj) {
        return apiFetch('/api/finance/incentive?project=' + encodeURIComponent(proj) + suffix)
          .catch(function(e) { return {error: String(e)}; });
      })
    );

    var firstErr = results.find(function(r) { return r.error; });
    if (firstErr) {
      document.getElementById('ic-result').innerHTML =
        '<div class="coming-soon-banner">Error: ' + esc(firstErr.error) + '</div>';
      return;
    }

    // Merge by user_email: sum hours + base across projects
    var byEmail     = {};
    var policyNotes = [];
    var maxDataAsOf = null;
    results.forEach(function(data) {
      if (data.policy_note && !policyNotes.includes(data.policy_note))
        policyNotes.push(data.policy_note);
      if (data.data_as_of) {
        if (!maxDataAsOf || data.data_as_of > maxDataAsOf)
          maxDataAsOf = data.data_as_of;
      }
      (data.items || []).forEach(function(item) {
        var k = (item.user_email || '').toLowerCase();
        if (!byEmail[k]) {
          byEmail[k] = Object.assign({}, item, {hours: 0, base: 0, incentive: 0});
        }
        byEmail[k].hours += item.hours || 0;
        byEmail[k].base  += item.base  || 0;
      });
    });

    var label  = projects.length === 1 ? projects[0] : (projects.length + ' projects');
    var merged = {
      items:       Object.values(byEmail),
      project:     label,
      policy_note: policyNotes.join(' '),
      data_as_of:  maxDataAsOf,
    };
    _incentiveState.lastItems   = merged.items;
    _incentiveState.lastProject = merged.project;
    renderIncentiveResult(merged);
  }

  // Restore selection display / re-trigger calc after filter change
  if (_incentiveState.projects.length) {
    updateInputDisplay();
    triggerCalc();
  }
}

    var rows    = document.querySelectorAll('#ic-result tbody tr, #ic-result .ic-card');
    var checked = [];
    rows.forEach(function(tr) {
      var cb = tr.querySelector('.ic-row-cb');
      if (!cb || !cb.checked) return;
      if (tr.dataset.fte !== '1') return;
      checked.push({tr: tr, base: parseFloat(tr.dataset.base) || 0, hours: parseFloat(tr.dataset.hours) || 0});
    });
    var sumBase  = checked.reduce(function(a, x) { return a + x.base;  }, 0);
    var sumHours = checked.reduce(function(a, x) { return a + x.hours; }, 0);
    var m, sumIncentive;
    if (_incentiveState.lastChanged === 'amount') {
      var target = parseFloat(document.getElementById('ic-amount').value) || 0;
      if (sumBase > 0) {
        m            = 1 + (target / sumBase);
        sumIncentive = target;
      } else {
        m            = NaN;
        sumIncentive = 0;
      }
      var mInput = document.getElementById('ic-multiplier');
      if (mInput) mInput.value = isNaN(m) ? '' : m.toFixed(2);
      if (!isNaN(m)) _incentiveState.multiplier = m;
    } else {
      m            = parseFloat(document.getElementById('ic-multiplier').value) || 1.0;
      sumIncentive = sumBase * (m - 1);
      _incentiveState.multiplier = m;
      var aInput = document.getElementById('ic-amount');
      if (aInput) aInput.value = sumIncentive.toFixed(2);
      _incentiveState.amount = sumIncentive;
    }
    rows.forEach(function(tr) {
      var cb      = tr.querySelector('.ic-row-cb');
      var hasRate = tr.dataset.hasRate === '1';
      var base    = parseFloat(tr.dataset.base) || 0;
      var incCell = tr.querySelector('td:last-child') || tr.querySelector('.ic-card-incentive value');
      if (!incCell) return;
      if (!hasRate) {
        incCell.innerHTML = '<span class="muted">—</span>';
      } else if (cb && cb.checked && !isNaN(m)) {
        var v = base * (m - 1);
        incCell.innerHTML = '<strong>₱' + v.toFixed(2) + '</strong>';
      } else {
        incCell.innerHTML = '<span class="muted">—</span>';
      }
    });
    var totalInc = isNaN(m) ? 0 : (sumBase * (m - 1));
    document.getElementById('ic-tot-label').textContent =
      'Total · ' + checked.length + ' FTE' + (checked.length === 1 ? '' : 's') + ' selected';
    document.getElementById('ic-tot-hours').textContent     = sumHours.toFixed(2) + 'h';
    document.getElementById('ic-tot-base').textContent      = '₱' + sumBase.toFixed(2);
    document.getElementById('ic-tot-incentive').textContent = isNaN(m) ? '—' : ('₱' + totalInc.toFixed(2));
    var sumCount = document.getElementById('ic-sum-count');
    var sumMult  = document.getElementById('ic-sum-mult');
    var sumTotal = document.getElementById('ic-sum-total');
    if (sumCount) sumCount.textContent = String(checked.length);
    if (sumMult)  sumMult.textContent  = isNaN(m) ? '—' : (m.toFixed(2).replace(/\.00$/, '').replace(/(\.\d)0$/, '$1') + '×');
    if (sumTotal) sumTotal.textContent = isNaN(m) ? '—' : ('₱' + totalInc.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}));
    var incPct = document.getElementById('ic-inc-pct');
    if (incPct) incPct.textContent = isNaN(m) ? '+0% of base' : ('+' + ((m - 1) * 100).toFixed(0) + '% of base');
  }

  var amtInput = document.getElementById('ic-amount');
  if (amtInput) amtInput.addEventListener('input', function() {
    _incentiveState.lastChanged = 'amount'; recomputeTotals();
  });
  var mulInput = document.getElementById('ic-multiplier');
  if (mulInput) mulInput.addEventListener('input', function() {
    _incentiveState.lastChanged = 'multiplier'; recomputeTotals();
  });
  document.querySelectorAll('.ic-row-cb').forEach(function(cb) {
    cb.addEventListener('change', recomputeTotals);
  });
  var cbAll = document.getElementById('ic-cb-all');
  if (cbAll) {
    cbAll.addEventListener('change', function() {
      document.querySelectorAll('.ic-row-cb').forEach(function(cb) {
        if (!cb.disabled) cb.checked = cbAll.checked;
      });
      recomputeTotals();
    });
  }
  recomputeTotals();
}

// ── Bootstrap ────────────────────────────────────────────────────────────────
(async function () {
  var fbCfg;
  try {
    fbCfg = await fetch('/api/firebase-config').then(function(r) { return r.json(); });
  } catch (e) {
    document.getElementById('loading-wall').textContent = 'Could not reach server.';
    return;
  }
  firebase.initializeApp(fbCfg);
  var auth = firebase.auth();

  auth.onAuthStateChanged(async function(user) {
    if (!user) {
      window.location.href = '/';
      return;
    }
    _currentUser = user;
    document.getElementById('user-chip').textContent = user.email;

    var periodsData;
    try {
      periodsData = await apiFetch('/api/periods');
    } catch (e) {
      document.getElementById('loading-wall').textContent = 'Error loading periods.';
      return;
    }
    STATE.periods = periodsData;

    // Persistent freshness indicator: show DATA_DIR mtime from /api/periods
    (function() {
      var el = document.getElementById('data-freshness');
      if (!el) return;
      var v = periodsData && periodsData.data_synced_at;
      el.textContent = 'Data as of ' + (v || '—');
    })();

    // ===== Shared period picker bootstrap =====
    // Set initial period: most recent already-started period for the default type (payperiod).
    {
      const todayStr = new Date().toISOString().slice(0, 10);
      const defaultType = 'payperiod';
      const defaultList = STATE.periods[defaultType] || [];
      const defaultPeriod = defaultList.slice().reverse().find(p => p.start <= todayStr) || defaultList[defaultList.length - 1];
      STATE.period.type  = defaultType;
      STATE.period.value = defaultPeriod ? defaultPeriod.value : '';
    }
    // Tab click: switch type, snap to best period, re-render.
    document.querySelectorAll('.pp-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        const type = btn.dataset.ppType;
        if (type === STATE.period.type) return;
        const list = STATE.periods[type] || [];
        if (!list.length) return;
        const todayIso = new Date().toISOString().slice(0, 10);
        const best = list.slice().reverse().find(p => p.start <= todayIso) || list[list.length - 1];
        STATE.period = {type, value: best ? best.value : list[list.length - 1].value};
        refreshPeriodPicker();
        _incentiveState.lastItems = null;
        document.getElementById('ic-result').innerHTML = '';
        renderFinanceIncentive('MG - Finance');
      });
    });
    // Value select: change period within current type.
    document.getElementById('pp-value').addEventListener('change', e => {
      STATE.period = {type: STATE.period.type, value: e.target.value};
      _incentiveState.lastItems = null;
      document.getElementById('ic-result').innerHTML = '';
      renderFinanceIncentive('MG - Finance');
    });
    // Today button: snap to current period.
    const todayBtnEl = document.getElementById('btn-today');
    if (todayBtnEl) {
      todayBtnEl.addEventListener('click', () => {
        const todayIso = new Date().toISOString().slice(0, 10);
        const list = STATE.periods[STATE.period.type] || [];
        if (!list.length) return;
        const containsToday = list.find(p => p.start <= todayIso && todayIso <= p.end);
        const target = containsToday || list[list.length - 1];
        if (!target || STATE.period.value === target.value) return;
        STATE.period = {type: STATE.period.type, value: target.value};
        refreshPeriodPicker();
        _incentiveState.lastItems = null;
        renderFinanceIncentive('MG - Finance');
      });
    }
    // Prev/next arrow buttons.
    const prevBtnEl = document.getElementById('btn-pp-prev');
    const nextBtnEl = document.getElementById('btn-pp-next');
    if (prevBtnEl) prevBtnEl.addEventListener('click', () => stepPeriod(-1));
    if (nextBtnEl) nextBtnEl.addEventListener('click', () => stepPeriod(+1));
    refreshPeriodPicker();
    // ===== / Shared period picker bootstrap =====

    document.getElementById('loading-wall').style.display = 'none';
    document.getElementById('shell').style.display        = 'block';

    renderFinanceIncentive('MG - Finance');
  });
})();
</script>
</body>
