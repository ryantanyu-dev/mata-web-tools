<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Workload Matrix · Mata Web Tools</title>
<style>
  :root {
    --bg:#ffffff; --border:#e5e5e7;
    --text:#1d1d1f; --muted:#6e6e73;
    --hover:#ececee; --active-bg:#1d1d1f; --active-fg:#ffffff;
    --panel:#ffffff; --panel-muted:#fafafa; --input-bg:#ffffff;
    --fs-2xs:9px; --fs-xs:10px; --fs-8:8px;
    --fs-sm:11px; --fs-base:12px; --fs-md:13px; --fs-14:14px;
    --fs-15:15px; --fs-lg:16px; --fs-18:18px;
    --sp-2:2px; --sp-3:3px; --sp-4:4px; --sp-5:5px; --sp-6:6px;
    --sp-7:7px; --sp-8:8px; --sp-9:9px; --sp-10:10px; --sp-12:12px;
    --sp-16:16px; --sp-24:24px; --sp-30:30px;
  }
  html[data-theme="dark"] {
    --bg:#0f1115; --border:#2a2d36;
    --text:#e5e7eb; --muted:#9ca3af;
    --hover:#1e222a; --active-bg:#e5e7eb; --active-fg:#0f1115;
    --panel:#14161c; --panel-muted:#181b22; --input-bg:#0f1115;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
       background:var(--bg);color:var(--text);font-size:var(--fs-base);line-height:1.5}
  #loading-wall{display:flex;align-items:center;justify-content:center;
                min-height:100vh;color:var(--muted);font-size:var(--fs-md)}
  #shell{display:none;max-width:1400px;margin:0 auto;padding:var(--sp-24)}
  .shell-hd{display:flex;align-items:center;gap:var(--sp-16);margin-bottom:var(--sp-24);flex-wrap:wrap}
  .back-link{font-size:var(--fs-sm);color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:4px}
  .back-link:hover{color:var(--text)}
  .shell-title{font-size:var(--fs-18);font-weight:700;flex:1}
  .user-chip{font-size:var(--fs-sm);color:var(--muted)}
  .muted{color:var(--muted)}
  .empty{color:var(--muted);padding:var(--sp-16);text-align:center}
  .banner{padding:var(--sp-12) var(--sp-16);background:var(--panel-muted);
          border:1px solid var(--border);border-radius:8px;font-size:var(--fs-md);color:var(--muted)}
  .btn{font:inherit;font-size:var(--fs-sm);padding:var(--sp-6) var(--sp-12);
       background:var(--panel-muted);border:1px solid var(--border);border-radius:6px;
       color:var(--text);cursor:pointer}
  .btn:hover{background:var(--hover)}
  .btn-small{padding:var(--sp-3) var(--sp-10);font-size:var(--fs-sm)}
  /* ── Workload Matrix CSS (verbatim from Panso index.html L1194-1231) ── */
  .dept-alloc-header { display: flex; align-items: center; gap: 16px; margin: var(--sp-14,14px) 0 var(--sp-10) ; flex-wrap: wrap; }
  .dept-alloc-range { display: inline-flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .dept-alloc-range label { display: inline-flex; align-items: center; gap: 6px; font-size: var(--fs-base); color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
  .dept-alloc-range input[type="date"] { font: inherit; font-size: var(--fs-base); padding: var(--sp-6) var(--sp-8); border: 1px solid var(--border); border-radius: 6px; background: #fff; color: var(--text); }
  .dept-alloc-presets { display: inline-flex; gap: 4px; flex-wrap: wrap; }
  .dept-alloc-presets .btn.btn-small { font-size: var(--fs-sm); padding: var(--sp-3) var(--sp-10); }
  .dept-alloc-stats { margin-bottom: 8px; font-size: var(--fs-base); }
  .dept-alloc-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; background: #fff; }
  table.dept-alloc { width: 100%; border-collapse: collapse; font-size: var(--fs-base); table-layout: auto; }
  table.dept-alloc th, table.dept-alloc td { padding: var(--sp-6) var(--sp-8); border-bottom: 1px solid var(--border); border-right: 1px solid #f1f3f5; text-align: right; vertical-align: top; }
  table.dept-alloc tr > *:last-child { border-right: 0; }
  table.dept-alloc thead th { background: #fafafa; font-size: var(--fs-sm); font-weight: 600; color: var(--text); position: sticky; top: 0; z-index: 1; }
  table.dept-alloc th.alloc-group-banner { text-align: center; font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 700; padding: var(--sp-6) var(--sp-4); border-bottom-width: 2px; border-bottom-style: solid; background: #fafafa; }
  table.dept-alloc th.alloc-group-banner .alloc-group-count { font-weight: 400; opacity: 0.7; font-size: var(--fs-2xs); }
  table.dept-alloc th.alloc-spacer { background: #fafafa; border-bottom-color: var(--border); }
  html[data-theme="dark"] table.dept-alloc th.alloc-group-banner,
  html[data-theme="dark"] table.dept-alloc th.alloc-spacer { background: var(--panel-muted); }
  table.dept-alloc th.alloc-proj { text-align: left; min-width: 220px; max-width: 360px; background: #fafafa; font-weight: 500; }
  table.dept-alloc .alloc-proj-name { font-weight: 500; line-height: 1.3; font-size: var(--fs-base); }
  table.dept-alloc .alloc-proj-client { font-size: var(--fs-xs); margin-top: 1px; }
  table.dept-alloc th.alloc-user { text-align: right; font-size: var(--fs-sm); white-space: nowrap; min-width: 52px; }
  table.dept-alloc .alloc-lead-pill { display: inline-block; margin-left: 4px; padding: 1px var(--sp-5); border-radius: 3px; color: #fff; font-size: var(--fs-8); font-weight: 700; letter-spacing: 0.4px; vertical-align: middle; }
  table.dept-alloc td.alloc-cell { font-variant-numeric: tabular-nums; min-width: 48px; }
  table.dept-alloc td.alloc-cell.alloc-zero { color: var(--muted); opacity: 0.4; }
  table.dept-alloc th.alloc-proj-total, table.dept-alloc th.alloc-user-total { background: #f9fafb; font-variant-numeric: tabular-nums; font-weight: 700; min-width: 56px; }
  table.dept-alloc tfoot th { background: #f9fafb; border-top: 2px solid var(--border); font-variant-numeric: tabular-nums; font-weight: 700; font-size: var(--fs-sm); }
  table.dept-alloc tfoot th.alloc-ft-label { text-align: left; text-transform: uppercase; letter-spacing: 0.4px; color: var(--muted); }
  table.dept-alloc tfoot th.alloc-ft-grand { font-size: var(--fs-base); }
  html[data-theme="dark"] .dept-alloc-wrap { background: var(--panel); border-color: var(--border); }
  html[data-theme="dark"] table.dept-alloc thead th { background: var(--panel-muted); }
  html[data-theme="dark"] table.dept-alloc th.alloc-proj { background: var(--panel-muted); color: var(--text); }
  html[data-theme="dark"] table.dept-alloc th.alloc-proj-total, html[data-theme="dark"] table.dept-alloc th.alloc-user-total { background: var(--panel-muted); }
  html[data-theme="dark"] table.dept-alloc tfoot th { background: var(--panel-muted); }
  html[data-theme="dark"] table.dept-alloc th, html[data-theme="dark"] table.dept-alloc td { border-color: var(--border); }
  html[data-theme="dark"] .dept-alloc-range input[type="date"] { background: var(--input-bg); color: var(--text); }
</style>
</head>
<body>
<div id="loading-wall">Loading…</div>

<div id="shell">
  <div class="shell-hd">
    <a class="back-link" href="/">← Tools</a>
    <div class="shell-title">MT-Ops · Workload Matrix</div>
    <div class="user-chip" id="user-chip"></div>
  </div>
  <div id="dept-body"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s) {
  return (s || '').toString().replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function isoLocal(d) {
  const pad = n => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}
// Per-department color map (verbatim from Panso)
const DEPT_COLOR_MAP = {
  'MG - Admin':                 '#16a34a',
  'MG - Finance':               '#16a34a',
  'MG - HR':                    '#16a34a',
  'MG - Recruitment':           '#14b8a6',
  'MG - Business Development':  '#14b8a6',
  'MG - Marketing':             '#eab308',
  'MT - Operations (Domestic)': '#f97316',
  'MT - Sales (Domestic)':      '#f97316',
  'E - Operations (Global)':    '#3b82f6',
  'MCS - Operations (Global)':  '#a855f7',
  'MCS - Sales (Global)':       '#a855f7',
  'TSF - Operations':           '#f43f5e',
};
function deptColor(name) {
  if (name === 'Unassigned') return '#64748b';
  return DEPT_COLOR_MAP[name] || '#64748b';
}
const INTERN_GREY = '#94a3b8';
const PTF_TEAL    = '#14b8a6';

// ── Auth ─────────────────────────────────────────────────────────────────────
let _cachedToken = null, _tokenExpiry = 0, _currentUser = null;
async function getToken() {
  if (_currentUser && Date.now() < _tokenExpiry - 60000) return _cachedToken;
  if (!_currentUser) return null;
  _cachedToken = await _currentUser.getIdToken(true);
  _tokenExpiry = Date.now() + 55 * 60 * 1000;
  return _cachedToken;
}
async function apiFetch(path) {
  const tok  = await getToken();
  const hdrs = tok ? { 'Authorization': 'Bearer ' + tok } : {};
  return fetch(path, { headers: hdrs }).then(r => r.json());
}

// ── Sibling dept grouping (verbatim from Panso DEPT_WORKLOAD_SIBLINGS) ──────
const DEPT_WORKLOAD_SIBLINGS = {
  'MT - Operations (Domestic)': [
    {dept: 'MT - Operations (Domestic)', label: 'Operations'},
    {dept: 'MT - Sales (Domestic)',      label: 'Sales'},
  ],
};

// ── Workload renderer (ported from Panso renderDeptWorkloadBody) ─────────────
const FIXED_DEPT = 'MT - Operations (Domestic)';

async function renderWorkload() {
  const name = FIXED_DEPT;
  const body = document.getElementById('dept-body');
  body.innerHTML = '<div class="empty">Loading workload…</div>';

  const siblings     = DEPT_WORKLOAD_SIBLINGS[name] || [{dept: name, label: name}];
  const allDeptNames = siblings.map(s => s.dept);
  const deptColorHex = deptColor(name);

  // Default range: first-of-month → today (local). Persisted in module var.
  const today = new Date();
  const first  = new Date(today.getFullYear(), today.getMonth(), 1);
  let range = { start: isoLocal(first), end: isoLocal(today) };

  // Quick-range presets
  const t = new Date();
  const iso = d => isoLocal(d);
  const todayIso      = iso(t);
  const presetThisMonth  = () => { const f = new Date(t.getFullYear(), t.getMonth(), 1); return { start: iso(f), end: todayIso }; };
  const presetLastMonth  = () => { const f = new Date(t.getFullYear(), t.getMonth()-1, 1); const l = new Date(t.getFullYear(), t.getMonth(), 0); return { start: iso(f), end: iso(l) }; };
  const presetThisWeek   = () => { const d = new Date(t); d.setDate(t.getDate() - t.getDay()); return { start: iso(d), end: todayIso }; };
  const presetYTD        = () => ({ start: t.getFullYear() + '-01-01', end: todayIso });

  // ── Header HTML
  const headerHtml =
    '<div class="dept-alloc-header">' +
      '<div class="dept-alloc-range">' +
        '<label>From<input type="date" id="alloc-start" value="' + esc(range.start) + '"></label>' +
        '<label>To<input type="date" id="alloc-end" value="' + esc(range.end) + '"></label>' +
        '<button type="button" class="btn" id="alloc-reload">Reload</button>' +
      '</div>' +
      '<div class="dept-alloc-presets">' +
        '<button type="button" class="btn btn-small" data-preset="week">This week</button>' +
        '<button type="button" class="btn btn-small" data-preset="month">This month</button>' +
        '<button type="button" class="btn btn-small" data-preset="lastmonth">Last month</button>' +
        '<button type="button" class="btn btn-small" data-preset="ytd">YTD</button>' +
      '</div>' +
      '<div class="muted" id="alloc-rangenote" style="font-size:var(--fs-base)"></div>' +
    '</div>' +
    '<div id="alloc-body"><div class="empty">Loading…</div></div>';
  body.innerHTML = headerHtml;

  // Wire inputs + presets
  const startEl = document.getElementById('alloc-start');
  const endEl   = document.getElementById('alloc-end');
  const noteEl  = document.getElementById('alloc-rangenote');

  const update = () => {
    const s = startEl.value, e = endEl.value;
    if (!s || !e) return;
    if (e < s) { noteEl.textContent = 'End date must be on or after start'; noteEl.style.color = '#b91c1c'; return; }
    noteEl.textContent = ''; noteEl.style.color = '';
    range = { start: s, end: e };
    loadAndRender();
  };
  startEl.addEventListener('change', update);
  endEl.addEventListener('change', update);
  document.getElementById('alloc-reload').addEventListener('click', update);
  document.querySelectorAll('[data-preset]').forEach(btn => {
    btn.addEventListener('click', () => {
      const p = btn.dataset.preset;
      let rr;
      if (p === 'week')       rr = presetThisWeek();
      else if (p === 'month')      rr = presetThisMonth();
      else if (p === 'lastmonth')  rr = presetLastMonth();
      else if (p === 'ytd')        rr = presetYTD();
      if (!rr) return;
      startEl.value = rr.start; endEl.value = rr.end;
      update();
    });
  });

  // ── Fetch + render
  async function loadAndRender() {
    const target = document.getElementById('alloc-body');
    target.innerHTML = '<div class="empty">Loading…</div>';
    let data;
    try {
      const namesParam = allDeptNames.map(encodeURIComponent).join(',');
      data = await apiFetch('/api/ops/workload?names=' + namesParam
        + '&start=' + encodeURIComponent(range.start)
        + '&end='   + encodeURIComponent(range.end)
        + '&clients_only=true');
    } catch (e) {
      target.innerHTML = '<div class="banner">Error loading workload: ' + esc(e.message || String(e)) + '</div>';
      return;
    }
    if (data.error) {
      target.innerHTML = '<div class="banner">' + esc(data.error) + '</div>';
      return;
    }
    if (!data.users.length || !data.projects.length) {
      target.innerHTML = '<div class="banner">No numbered client projects between <strong>' +
        esc(range.start) + '</strong> and <strong>' + esc(range.end) + '</strong> across ' +
        esc(allDeptNames.join(' + ')) + '.</div>';
      return;
    }

    // Heat-map shading
    let maxCell = 0;
    Object.values(data.matrix).forEach(row => Object.values(row).forEach(v => { if (v > maxCell) maxCell = v; }));
    const cellHtml = (hrs) => {
      if (!hrs) return '<td class="alloc-cell alloc-zero">—</td>';
      const intensity = maxCell > 0 ? Math.min(1, hrs / maxCell) : 0;
      const isOver = hrs > 8;
      const bg = isOver
        ? 'rgba(220, 38, 38, '  + (0.12 + intensity * 0.25).toFixed(2) + ')'
        : 'rgba(22, 163, 74, '  + (0.08 + intensity * 0.30).toFixed(2) + ')';
      return '<td class="alloc-cell" style="background:' + bg + '">' + hrs.toFixed(1) + '</td>';
    };

    // Staff coloring
    const usrColor = (u, siblingDeptColor) => {
      const em   = (u.email || '').toLowerCase();
      const role = (u.role  || '').toLowerCase();
      if (em.endsWith('@sandbox.org.ph')) return INTERN_GREY;
      if (role === 'ptf')    return PTF_TEAL;
      if (role === 'intern') return INTERN_GREY;
      return siblingDeptColor;
    };
    const firstName = (u) => (u.name || u.email || '').split(/[ .@]/)[0] || u.email;

    // Assemble groups (drop empty siblings)
    const groups = siblings
      .map(s => ({
        dept:  s.dept,
        label: s.label,
        color: deptColor(s.dept) || deptColorHex,
        users: (data.users_by_dept && data.users_by_dept[s.dept]) || [],
      }))
      .filter(g => g.users.length > 0);
    const flatUsers = [].concat(...groups.map(g => g.users));

    // Row 1: dept banner
    const bannerRow =
      '<tr class="alloc-group-row">' +
        '<th class="alloc-proj alloc-spacer"></th>' +
        groups.map(g =>
          '<th class="alloc-group-banner" colspan="' + g.users.length + '" style="color:' + g.color + '; border-bottom-color:' + g.color + '">' +
            esc(g.label.toUpperCase()) + ' <span class="alloc-group-count">· ' + g.users.length + '</span>' +
          '</th>'
        ).join('') +
        '<th class="alloc-proj-total alloc-spacer"></th>' +
      '</tr>';

    // Row 2: staff names
    const staffRow = '<tr>' +
      '<th class="alloc-proj">Project</th>' +
      groups.map(g =>
        g.users.map(u => {
          const role   = (u.role || '').toLowerCase();
          const isLead = role === 'lead';
          const style  = 'color:' + usrColor(u, g.color) + (isLead ? '; font-weight:700' : '');
          const badge  = isLead ? ' <span class="alloc-lead-pill" style="background:' + g.color + '">LEAD</span>' : '';
          return '<th class="alloc-user" style="' + style + '" title="' + esc(u.email) + '">' +
            esc(firstName(u)) + badge +
          '</th>';
        }).join('')
      ).join('') +
      '<th class="alloc-proj-total">Total</th>' +
    '</tr>';

    // Staff totals (footer)
    const staffTotals = flatUsers.map(u =>
      '<th class="alloc-user-total">' + (u.total_hours || 0).toFixed(1) + '</th>'
    ).join('');

    // Project rows
    const rowsHtml = data.projects.map(p => {
      const cells = flatUsers.map(u => {
        const hrs = (data.matrix[p.project_name] || {})[u.email] || 0;
        return cellHtml(hrs);
      }).join('');
      const clientLine = p.client_name
        ? '<div class="alloc-proj-client muted">' + esc(p.client_name) + '</div>'
        : '';
      return '<tr>' +
        '<th class="alloc-proj">' +
          '<div class="alloc-proj-name">' + esc(p.project_name) + '</div>' +
          clientLine +
        '</th>' +
        cells +
        '<th class="alloc-proj-total">' + (p.total_hours || 0).toFixed(1) + '</th>' +
      '</tr>';
    }).join('');

    const dayCount      = (new Date(range.end) - new Date(range.start)) / 86400000 + 1;
    const groupsSummary = groups.map(g => g.users.length + ' ' + g.label.toLowerCase()).join(' + ');

    target.innerHTML =
      '<div class="dept-alloc-stats">' +
        '<span class="muted">' + data.projects.length + ' client projects · ' +
        groupsSummary + ' (' + flatUsers.length + ' staff) · ' +
        (data.total_hours || 0).toFixed(1) + 'h total · ' + dayCount + '-day span</span>' +
      '</div>' +
      '<div class="dept-alloc-wrap">' +
        '<table class="dept-alloc">' +
          '<thead>' + bannerRow + staffRow + '</thead>' +
          '<tbody>' + rowsHtml + '</tbody>' +
          '<tfoot>' +
            '<tr>' +
              '<th class="alloc-proj alloc-ft-label">Totals</th>' + staffTotals +
              '<th class="alloc-proj-total alloc-ft-grand">' + (data.total_hours || 0).toFixed(1) + '</th>' +
            '</tr>' +
          '</tfoot>' +
        '</table>' +
      '</div>';
  }

  loadAndRender();
}

// ── Bootstrap ────────────────────────────────────────────────────────────────
(async function () {
  let fbCfg;
  try {
    fbCfg = await fetch('/api/firebase-config').then(r => r.json());
  } catch (e) {
    document.getElementById('loading-wall').textContent = 'Could not reach server.';
    return;
  }
  firebase.initializeApp(fbCfg);
  firebase.auth().onAuthStateChanged(async function(user) {
    if (!user) { window.location.href = '/'; return; }
    _currentUser = user;
    document.getElementById('user-chip').textContent = user.email;
    document.getElementById('loading-wall').style.display = 'none';
    document.getElementById('shell').style.display        = 'block';
    renderWorkload();
  });
})();
</script>
</body>
</html>
