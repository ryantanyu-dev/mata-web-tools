<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Intern Allowance Matrix · Mata Web Tools</title>
<style>
  :root {
    --bg:#ffffff; --border:#e5e5e7;
    --text:#1d1d1f; --muted:#6e6e73;
    --hover:#ececee; --active-bg:#1d1d1f; --active-fg:#ffffff;
    --good:#16a34a; --warn:#ca8a04;
    --panel:#ffffff; --panel-muted:#fafafa; --input-bg:#ffffff;
    --fs-2xs:9px; --fs-xs:10px; --fs-10-5:10.5px; --fs-12-5:12.5px;
    --fs-sm:11px; --fs-base:12px; --fs-md:13px; --fs-14:14px;
    --fs-15:15px; --fs-lg:16px; --fs-18:18px; --fs-20:20px;
    --sp-2:2px; --sp-3:3px; --sp-4:4px; --sp-6:6px;
    --sp-8:8px; --sp-10:10px; --sp-12:12px; --sp-16:16px;
    --sp-24:24px;
  }
  html[data-theme="dark"] {
    --bg:#0f1115; --border:#2a2d36;
    --text:#e5e7eb; --muted:#9ca3af;
    --hover:#1e222a; --active-bg:#e5e7eb; --active-fg:#0f1115;
    --good:#22c55e; --warn:#eab308;
    --panel:#14161c; --panel-muted:#181b22; --input-bg:#0f1115;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
       background:var(--bg);color:var(--text);font-size:var(--fs-base);line-height:1.5}
  #loading-wall{display:flex;align-items:center;justify-content:center;
                min-height:100vh;color:var(--muted);font-size:var(--fs-md)}
  #shell{display:none;max-width:1280px;margin:0 auto;padding:var(--sp-24)}
  .shell-hd{display:flex;align-items:center;gap:var(--sp-16);margin-bottom:var(--sp-24);flex-wrap:wrap}
  .back-link{font-size:var(--fs-sm);color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:4px}
  .back-link:hover{color:var(--text)}
  .shell-title{font-size:var(--fs-18);font-weight:700;flex:1}
  .user-chip{font-size:var(--fs-sm);color:var(--muted)}
  .period-bar{display:flex;gap:var(--sp-12);align-items:center;flex-wrap:wrap;
              margin-bottom:var(--sp-24);padding:var(--sp-12) var(--sp-16);
              background:var(--panel-muted);border:1px solid var(--border);border-radius:8px}
  /* ── Custom select chevron (SVG dropdown arrow, ported from Panso) ── */
  select{appearance:none;-webkit-appearance:none;-moz-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6' fill='none' stroke='%236e6e73' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><path d='M1 1l4 4 4-4'/></svg>");
    background-repeat:no-repeat;background-position:right 12px center;
    background-size:10px 6px;padding-right:30px}
  select::-ms-expand{display:none}
  html[data-theme="dark"] select{
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6' fill='none' stroke='%239ca3af' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><path d='M1 1l4 4 4-4'/></svg>");
    background-size:10px 6px}
  /* ── Period picker (ported verbatim from Panso) ── */
  .pp-tabs{display:inline-flex;align-items:stretch;background:#f3f3f5;border-radius:8px;padding:var(--sp-2);border:1px solid var(--border);height:36px;box-sizing:border-box}
  .pp-tab{border:0;background:transparent;font:inherit;font-size:var(--fs-base);padding:0 var(--sp-10);border-radius:6px;cursor:pointer;color:var(--muted);display:inline-flex;align-items:center}
  .pp-tab:hover{color:var(--text)}
  .pp-tab.active{background:#fff;color:var(--text);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,0.08)}
  .pp-tab:focus-visible{outline:2px solid var(--active-bg);outline-offset:2px}
  .pp-tab:not(.active):hover{background:rgba(0,0,0,0.04);color:var(--text)}
  #pp-value{padding:0 var(--sp-10);font:inherit;font-size:var(--fs-base);line-height:32px;height:100%;border:1px solid var(--border);border-radius:8px;background:#fff;min-width:180px;box-sizing:border-box}
  .pp-cluster{display:inline-flex;align-items:stretch;background:#f3f3f5;border:1px solid var(--border);border-radius:8px;padding:var(--sp-2);gap:2px;height:36px;box-sizing:border-box}
  .pp-cluster > select,.pp-cluster > .pp-btn{font:inherit;font-size:var(--fs-base);line-height:1;background:transparent;border:0;color:var(--muted);cursor:pointer;border-radius:6px;padding:0 var(--sp-10);font-weight:600;letter-spacing:0.2px;display:inline-flex;align-items:center}
  .pp-cluster > select{background-color:#fff;color:var(--text);padding:0 28px 0 10px;min-width:160px;border:1px solid var(--border);height:100%;box-sizing:border-box;background-position:right 10px center;background-size:10px 6px}
  .pp-cluster > .pp-btn#btn-pp-prev,.pp-cluster > .pp-btn#btn-pp-next{background:#fff;border:1px solid var(--border);font-size:var(--fs-lg);font-weight:700;color:var(--text);padding:0 var(--sp-10);min-width:28px}
  .pp-cluster > .pp-btn#btn-pp-prev:hover:not(:disabled),.pp-cluster > .pp-btn#btn-pp-next:hover:not(:disabled){background:var(--text);color:#fff;border-color:var(--text)}
  .pp-cluster > .pp-btn:hover:not(:disabled){background:#fff;color:var(--text)}
  .pp-cluster > .pp-btn:disabled{opacity:0.35;cursor:default}
  .pp-cluster > .pp-btn-today:hover:not(:disabled){background:var(--text);color:#fff}
  /* Dark mode overrides for pp- components */
  html[data-theme="dark"] .pp-tabs,html[data-theme="dark"] .pp-cluster{background:var(--panel-muted);border-color:var(--border)}
  html[data-theme="dark"] .pp-cluster > select,html[data-theme="dark"] #pp-value{background:var(--input-bg);color:var(--text);border-color:var(--border)}
  html[data-theme="dark"] .pp-cluster > .pp-btn{background:var(--panel);color:var(--panel);border-color:var(--border)}
  html[data-theme="dark"] .pp-cluster > .pp-btn#btn-pp-prev,html[data-theme="dark"] .pp-cluster > .pp-btn#btn-pp-next{background:var(--panel);color:var(--text);border-color:var(--border)}
  html[data-theme="dark"] .pp-tab.active{background:var(--panel);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,0.35)}
  html[data-theme="dark"] .pp-cluster > .pp-btn#btn-pp-next:hover:not(:disabled),.pp-cluster > .pp-btn-today:hover:not(:disabled){background:var(--text);color:#fff}
  .muted{color:var(--muted)}
  .empty{color:var(--muted);padding:var(--sp-16);text-align:center}
  /* ── Intern Allowance Matrix layout ── */
  .pm-wrap{padding:var(--sp-4) 0 24px}
  .pm-hd{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:8px}
  .pm-stats{display:flex;gap:8px;flex-wrap:wrap}
  .pm-stat{background:#fff;border:1px solid var(--border);border-radius:8px;
           padding:var(--sp-6) var(--sp-12);display:flex;flex-direction:column;gap:2px;min-width:110px}
  .pm-stat-num{font-size:var(--fs-lg);font-weight:700;font-variant-numeric:tabular-nums}
  .pm-stat-lbl{font-size:var(--fs-xs);color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
  .pm-section{margin-bottom:24px}
  .pm-section-hd{font-size:var(--fs-md);font-weight:600;padding:var(--sp-6) var(--sp-10);
                 border-radius:6px 6px 0 0;border-bottom:2px solid;margin-bottom:6px}
  .pm-cell-zero{opacity:.28}
  .pm-table{background:#fff;border:1px solid var(--border);border-radius:8px;overflow-x:auto}
  .pm-table-hd,.pm-row{
    display:grid;
    grid-template-columns:minmax(180px,1.4fr) repeat(8,minmax(70px,1fr)) minmax(70px,1fr) minmax(70px,1fr) minmax(90px,1.1fr);
    gap:6px;padding:var(--sp-8) var(--sp-12);align-items:center;min-width:1100px}
  .pm-table-hd{background:var(--panel-muted);border-bottom:1px solid var(--border);
               font-size:var(--fs-10-5);font-weight:600;letter-spacing:.04em;
               text-transform:uppercase;color:var(--muted)}
  .pm-row{border-bottom:1px solid var(--border);font-size:var(--fs-12-5)}
  .pm-row:last-child{border-bottom:0}
  .pm-row:hover{background:#fafafa}
  .pm-c-num{text-align:right;font-variant-numeric:tabular-nums}
  .pm-c-pay{font-size:var(--fs-sm);color:var(--muted)}
  .pm-c-total{font-weight:700;font-size:var(--fs-md)}
  .pm-name{font-weight:600;line-height:1.25}
  .pm-email{font-size:var(--fs-xs);line-height:1.2}
  html[data-theme="dark"] .pm-stat{background:var(--panel)}
  html[data-theme="dark"] .pm-table{background:var(--panel)}
  html[data-theme="dark"] .pm-row:hover{background:var(--hover)}
  html[data-theme="dark"] select{background:var(--input-bg);color:var(--text);border-color:var(--border)}
</style>
</head>
<body>
<div id="loading-wall">Loading…</div>

<div id="shell">
  <div class="shell-hd">
    <a class="back-link" href="/">← Tools</a>
    <div class="shell-title">MG-HR · Intern Allowance Matrix</div>
    <div class="user-chip" id="user-chip"></div>
  </div>

  <!-- ===== Shared period picker (ported verbatim from Panso) — keep in sync with Incentive Calculator ===== -->
  <div class="period-bar" id="period-picker">
    <div class="pp-tabs" role="tablist">
      <button type="button" class="pp-tab active" data-pp-type="payperiod" role="tab" aria-selected="true">Pay-period</button>
      <button type="button" class="pp-tab" data-pp-type="week" role="tab" aria-selected="false">Week</button>
      <button type="button" class="pp-tab" data-pp-type="month" role="tab" aria-selected="false">Month</button>
    </div>
    <div class="pp-cluster" role="group" aria-label="Period navigation">
      <select id="pp-value" aria-label="Select period"></select>
      <button type="button" class="pp-btn" id="btn-pp-prev" title="Previous period" aria-label="Previous period">‹</button>
      <button type="button" class="pp-btn" id="btn-pp-next" title="Next period" aria-label="Next period">›</button>
      <button type="button" class="pp-btn pp-btn-today" id="btn-today" title="Snap to the period containing today">Today</button>
    </div>
  </div>
  <!-- ===== / Shared period picker ===== -->

  <div id="dept-body"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
function esc(s) {
  return (s || '').toString().replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtPHP(n) {
  const f = (+n || 0).toFixed(2).split('.');
  f[0] = f[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return '₱' + f[0] + '.' + f[1];
}

let _cachedToken = null;
let _tokenExpiry = 0;
let _currentUser = null;

async function getToken() {
  if (_currentUser && Date.now() < _tokenExpiry - 60000) return _cachedToken;
  if (!_currentUser) return null;
  _cachedToken = await _currentUser.getIdToken(true);
  _tokenExpiry = Date.now() + 55 * 60 * 1000;
  return _cachedToken;
}

async function apiFetch(path) {
  const tok  = await getToken();
  const hdrs = tok ? { 'Authorization': 'Bearer ' + tok } : {};
  const resp = await fetch(path, { headers: hdrs });
  return resp.json();
}

const STATE = { period: { type: 'payperiod', value: '' }, periods: {} };

function currentPeriodParam() {
  return 'type=' + encodeURIComponent(STATE.period.type) +
         '&value=' + encodeURIComponent(STATE.period.value || '');
}
function currentPeriodLabel() {
  const list = STATE.periods[STATE.period.type] || [];
  const hit  = list.find(p => p.value === STATE.period.value);
  return hit ? hit.label : (STATE.period.value || '');
}

// ── Intern Allowance Matrix renderers ─────────────────────────────────────────────────────
const _SECTION_COLORS = ['#f97316','#8b5cf6','#0ea5e9','#16a34a','#f43f5e','#ca8a04','#14b8a6','#6366f1'];

function renderPayRow(it, sectionColor) {
  const cb = {};
  for (const c of (it.cat_breakdown || [])) cb[c.code] = c;

  function _catCell(code) {
    const c      = cb[code] || {hours: 0, pay: 0, rate: 0};
    const isZero = c.hours === 0;
    const zeroCls = isZero ? ' pm-cell-zero' : '';
    const hr  = c.hours.toFixed(2) + 'h';
    const pay = c.rate > 0 ? fmtPHP(c.pay) : '<span class="muted">₱0</span>';
    return '<div class="pm-c-num' + zeroCls + '"><div>' + hr + '</div>' +
           '<div class="pm-c-pay">' + pay + '</div></div>';
  }

  const billZero  = (it.hours.billable  || 0) === 0;
  const trainZero = (it.hours.training  || 0) === 0;
  const accent    = sectionColor || 'var(--text)';

  return '<div class="pm-row" data-email="' + esc(it.email) + '">' +
    '<div class="pm-c-name">' +
      '<div class="pm-name"><span style="color:' + accent + '">' + esc(it.name || it.email) + '</span></div>' +
      '<div class="pm-email muted">' + esc(it.email) + '</div>' +
    '</div>' +
    _catCell('0') + _catCell('1a') + _catCell('1b') + _catCell('1c') +
    _catCell('2') + _catCell('3') + _catCell('4') + _catCell('5') +
    '<div class="pm-c-num' + (billZero  ? ' pm-cell-zero' : '') + '">' +
      '<div>' + (it.hours.billable || 0).toFixed(2) + 'h</div>' +
      '<div class="pm-c-pay">' + fmtPHP(it.pay.billable) + '</div>' +
    '</div>' +
    '<div class="pm-c-num' + (trainZero ? ' pm-cell-zero' : '') + '">' +
      '<div>' + (it.hours.training || 0).toFixed(2) + 'h</div>' +
      '<div class="pm-c-pay muted">₱0</div>' +
    '</div>' +
    '<div class="pm-c-num pm-c-total">' + fmtPHP(it.total_pay) + '</div>' +
  '</div>';
}

function renderHrPayMatrix(data) {
  const body = document.getElementById('dept-body');
  if (!data || !data.items) {
    body.innerHTML = '<div class="empty">No data returned.</div>';
    return;
  }

  const items      = data.items;
  const periodLbl  = currentPeriodLabel();
  const policy     = data.policy || {};

  // Aggregate totals
  const totalAllowance = items.reduce((s, x) => s + (x.total_pay || 0), 0);
  const totalCount     = items.length;

  // Group by manager (preserve server sort order)
  const groups  = [];
  const groupIdx = {};
  for (const it of items) {
    const mgr = it.manager || '(unassigned)';
    if (groupIdx[mgr] === undefined) {
      groupIdx[mgr] = groups.length;
      groups.push({ manager: mgr, items: [] });
    }
    groups[groupIdx[mgr]].items.push(it);
  }

  // Table header
  const TABLE_HDR =
    '<div class="pm-table-hd">' +
      '<div>Intern</div>' +
      '<div>Cat 0</div><div>Cat 1a</div><div>Cat 1b</div><div>Cat 1c</div>' +
      '<div>Cat 2</div><div>Cat 3</div><div>Cat 4</div><div>Cat 5</div>' +
      '<div>Billable</div><div>Training</div>' +
      '<div>Total Pay</div>' +
    '</div>';

  let html =
    '<div class="pm-wrap">' +
    '<div class="pm-hd">' +
      '<div>' +
        '<div style="font-size:var(--fs-18);font-weight:700">' +
          'Intern Allowance Matrix <span class="muted" style="font-weight:400;font-size:var(--fs-14)">· ' + esc(periodLbl) + '</span>' +
        '</div>' +
        '<div style="font-size:var(--fs-sm);color:var(--muted);margin-top:4px">' +
          'Policy ' + esc(policy.policy_no || '002502') + ' v' + esc(policy.version || '1.1') +
          ' · productive ₱' + (policy.productive_rate || 15) + '/hr · billable ₱' + (policy.billable_rate || 30) + '/hr (numbered non-TSF)' +
        '</div>' +
      '</div>' +
      '<div class="pm-stats">' +
        '<div class="pm-stat">' +
          '<div class="pm-stat-num">' + fmtPHP(totalAllowance) + '</div>' +
          '<div class="pm-stat-lbl">Total Allowance</div>' +
        '</div>' +
        '<div class="pm-stat">' +
          '<div class="pm-stat-num">' + totalCount + '</div>' +
          '<div class="pm-stat-lbl">Interns</div>' +
        '</div>' +
      '</div>' +
    '</div>';

  // One section per manager
  groups.forEach(function(g, gi) {
    const color = _SECTION_COLORS[gi % _SECTION_COLORS.length];
    const groupTotal = g.items.reduce((s, x) => s + (x.total_pay || 0), 0);
    html +=
      '<div class="pm-section">' +
        '<div class="pm-section-hd" style="color:' + color + ';border-color:' + color + ';background:' + color + '18">' +
          esc(g.manager) +
          ' <span style="font-weight:400;font-size:var(--fs-sm);opacity:.7">' + fmtPHP(groupTotal) + '</span>' +
        '</div>' +
        '<div class="pm-table">' +
          TABLE_HDR +
          g.items.map(it => renderPayRow(it, color)).join('') +
        '</div>' +
      '</div>';
  });

  if (groups.length === 0) {
    html += '<div class="empty">No interns found for this period.</div>';
  }

  html += '</div>';
  body.innerHTML = html;
}

async function loadPayMatrix() {
  const body = document.getElementById('dept-body');
  body.innerHTML = '<div class="empty">Loading…</div>';
  try {
    const data = await apiFetch('/api/hr/interns/pay?' + currentPeriodParam());
    if (data && data.error) {
      body.innerHTML = '<div class="empty" style="color:var(--warn)">' + esc(data.error) + '</div>';
      return;
    }
    renderHrPayMatrix(data);
  } catch (e) {
    body.innerHTML = '<div class="empty" style="color:var(--warn)">Network error: ' + esc(String(e)) + '</div>';
  }
}

// ── Bootstrap ────────────────────────────────────────────────────────────────
(async function () {
  var fbCfg;
  try {
    fbCfg = await fetch('/api/firebase-config').then(function(r) { return r.json(); });
  } catch (e) {
    document.getElementById('loading-wall').textContent = 'Could not reach server.';
    return;
  }
  firebase.initializeApp(fbCfg);
  var auth = firebase.auth();

  auth.onAuthStateChanged(async function(user) {
    if (!user) {
      window.location.href = '/';
      return;
    }
    _currentUser = user;
    document.getElementById('user-chip').textContent = user.email;

    var periodsData;
    try {
      periodsData = await apiFetch('/api/periods');
    } catch (e) {
      document.getElementById('loading-wall').textContent = 'Error loading periods.';
      return;
    }
    STATE.periods = periodsData;

    // ===== Shared period picker (ported verbatim from Panso) — keep in sync with Incentive Calculator =====
    function refreshPeriodPicker() {
      // Tab active state
      document.querySelectorAll('.pp-tab').forEach(btn => {
        const on = btn.dataset.ppType === STATE.period.type;
        btn.classList.toggle('active', on);
        btn.setAttribute('aria-selected', on ? 'true' : 'false');
      });
      // Value dropdown
      const list = STATE.periods[STATE.period.type] || [];
      const sel  = document.getElementById('pp-value');
      if (!list.length) { sel.innerHTML = '<option>No data</option>'; sel.disabled = true; return; }
      sel.disabled = false;
      // Today button: disabled when already on today's period.
      const todayBtn = document.getElementById('btn-today');
      if (todayBtn) {
        const todayIso = new Date().toISOString().slice(0, 10);
        const now    = list.find(p => p.start <= todayIso && todayIso <= p.end);
        const target = now || list[list.length - 1];
        todayBtn.disabled = !target || STATE.period.value === target.value;
        todayBtn.title = now
          ? ('Snap to ' + (now.label || now.value))
          : (target ? ('Today has no data. Snap to latest (' + (target.label || target.value) + ')') : 'No periods available');
      }
      // Prev/next arrows: disabled at list boundaries.
      const idx     = list.findIndex(p => p.value === STATE.period.value);
      const prevBtn = document.getElementById('btn-pp-prev');
      const nextBtn = document.getElementById('btn-pp-next');
      if (prevBtn) { prevBtn.disabled = idx <= 0; prevBtn.title = idx > 0 ? 'Go to ' + (list[idx-1].label || list[idx-1].value) : 'At the start'; }
      if (nextBtn) { nextBtn.disabled = idx < 0 || idx >= list.length - 1; nextBtn.title = (idx >= 0 && idx < list.length - 1) ? 'Go to ' + (list[idx+1].label || list[idx+1].value) : 'At the latest'; }
      sel.innerHTML = list.slice().reverse().map(p =>
        '<option value="' + esc(p.value) + '"' + (p.value === STATE.period.value ? ' selected' : '') + '>' + esc(p.label) + '</option>'
      ).join('');
    }

    function stepPeriod(delta) {
      const list = STATE.periods[STATE.period.type] || [];
      const idx  = list.findIndex(p => p.value === STATE.period.value);
      if (idx < 0) return;
      const nextIdx = idx + delta;
      if (nextIdx < 0 || nextIdx >= list.length) return;
      STATE.period = {type: STATE.period.type, value: list[nextIdx].value};
      refreshPeriodPicker();
      loadPayMatrix();
    }

    // Bootstrap: default to most-recent already-started payperiod (task-08 rule preserved).
    {
      const todayStr = new Date().toISOString().slice(0, 10);
      const defaultType = 'payperiod';
      const defaultList = STATE.periods[defaultType] || [];
      const defaultPeriod = defaultList.slice().reverse().find(p => p.start <= todayStr) || defaultList[defaultList.length - 1];
      STATE.period.type  = defaultType;
      STATE.period.value = defaultPeriod ? defaultPeriod.value : '';
    }

    // Tab clicks: switch type, snap to best started period.
    document.querySelectorAll('.pp-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        const type = btn.dataset.ppType;
        if (type === STATE.period.type) return;
        const list = STATE.periods[type] || [];
        if (!list.length) return;
        const todayIso = new Date().toISOString().slice(0, 10);
        const best = list.slice().reverse().find(p => p.start <= todayIso) || list[list.length - 1];
        STATE.period = {type, value: best ? best.value : list[list.length - 1].value};
        refreshPeriodPicker();
        loadPayMatrix();
      });
    });
    // Value select: change period within current type.
    document.getElementById('pp-value').addEventListener('change', e => {
      STATE.period = {type: STATE.period.type, value: e.target.value};
      refreshPeriodPicker();
      loadPayMatrix();
    });
    // Today button.
    const todayBtnEl = document.getElementById('btn-today');
    if (todayBtnEl) {
      todayBtnEl.addEventListener('click', () => {
        const todayIso = new Date().toISOString().slice(0, 10);
        const list = STATE.periods[STATE.period.type] || [];
        if (!list.length) return;
        const containsToday = list.find(p => p.start <= todayIso && todayIso <= p.end);
        const target = containsToday || list[list.length - 1];
        if (!target || STATE.period.value === target.value) return;
        STATE.period = {type: STATE.period.type, value: target.value};
        refreshPeriodPicker();
        loadPayMatrix();
      });
    }
    // Prev/next arrow buttons.
    const prevBtnEl = document.getElementById('btn-pp-prev');
    const nextBtnEl = document.getElementById('btn-pp-next');
    if (prevBtnEl) prevBtnEl.addEventListener('click', () => stepPeriod(-1));
    if (nextBtnEl) nextBtnEl.addEventListener('click', () => stepPeriod(+1));
    refreshPeriodPicker();
    // ===== / Shared period picker =====

    document.getElementById('loading-wall').style.display = 'none';
    document.getElementById('shell').style.display        = 'block';

    loadPayMatrix();
  });
})();
</script>
</body>
</html>
