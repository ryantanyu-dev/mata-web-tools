<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mata Web Tools</title>
<style>
  :root {
    --bg:#ffffff; --border:#e5e5e7; --text:#1d1d1f; --muted:#6e6e73;
    --hover:#f0f0f2; --panel:#ffffff; --panel-muted:#fafafa;
    --good:#16a34a; --bad:#dc2626;
    --sp-8:8px; --sp-12:12px; --sp-16:16px; --sp-24:24px; --sp-32:32px;
    --fs-sm:11px; --fs-base:13px; --fs-md:14px; --fs-lg:16px; --fs-xl:22px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
       background:var(--bg);color:var(--text);font-size:var(--fs-base);line-height:1.5}
  #auth-wall{display:flex;flex-direction:column;align-items:center;justify-content:center;
             min-height:100vh;gap:var(--sp-24);padding:var(--sp-32)}
  .logo{font-size:var(--fs-xl);font-weight:700}
  .logo span{color:var(--muted);font-weight:400}
  #sign-in-btn{padding:10px 24px;background:#1d1d1f;color:#fff;border:none;
               border-radius:8px;font-size:var(--fs-md);font-weight:600;
               cursor:pointer;display:flex;align-items:center;gap:8px}
  #sign-in-btn:hover{background:#333}
  #auth-error{color:var(--bad);font-size:var(--fs-sm);text-align:center;max-width:320px}

  #app{display:none;max-width:900px;margin:0 auto;padding:var(--sp-32) var(--sp-24)}
  .app-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-32)}
  .app-hd .logo{font-size:var(--fs-lg)}
  .user-chip{font-size:var(--fs-sm);color:var(--muted);display:flex;align-items:center;gap:8px}
  .sign-out-btn{background:none;border:1px solid var(--border);border-radius:6px;
                padding:4px 10px;font-size:var(--fs-sm);cursor:pointer;color:var(--muted)}
  .sign-out-btn:hover{background:var(--hover)}

  .section-lbl{font-size:var(--fs-sm);font-weight:700;color:var(--muted);
               text-transform:uppercase;letter-spacing:.04em;margin-bottom:var(--sp-12)}
  .tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
              gap:var(--sp-16);margin-bottom:var(--sp-32)}
  .tool-card{border:1px solid var(--border);border-radius:12px;padding:var(--sp-16) var(--sp-16);
             background:var(--panel);text-decoration:none;color:var(--text);
             display:flex;flex-direction:column;gap:8px;transition:box-shadow .15s,background .15s}
  .tool-card:hover{background:var(--hover);box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .tool-card.coming-soon{opacity:.55;cursor:default;pointer-events:none}
  .tool-name{font-weight:700;font-size:var(--fs-md)}
  .tool-dept{font-size:var(--fs-sm);color:var(--muted)}
  .tool-badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.04em;
              text-transform:uppercase;padding:2px 7px;border-radius:999px;
              background:#f3f4f6;color:var(--muted);border:1px solid var(--border)}
  .tool-badge.live{background:#dcfce7;color:#15803d;border-color:#86efac}
  .group-header{display:flex;align-items:baseline;gap:var(--sp-8);margin-bottom:var(--sp-12)}
  .group-header-name{font-size:var(--fs-sm);font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.04em}
  .group-header-lead{font-size:var(--fs-sm);color:var(--muted)}
  #loading{color:var(--muted);font-size:var(--fs-sm);text-align:center;padding:var(--sp-32)}
</style>
</head>
<body>

<!-- Sign-in wall (shown before auth) -->
<div id="auth-wall">
  <div class="logo">Mata Web Tools <span>· Internal</span></div>
  <p style="color:var(--muted);font-size:var(--fs-md);text-align:center;max-width:320px">
    Department-specific tools for the Mata group.<br>Sign in with your @mata.ph account.
  </p>
  <button id="sign-in-btn">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.11 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.61-13.45-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Sign in with Google
  </button>
  <div id="auth-error"></div>
</div>

<!-- Main app (shown after auth) -->
<div id="app">
  <div class="app-hd">
    <div class="logo">Mata Web Tools</div>
    <div class="user-chip">
      <span id="user-email-lbl"></span>
      <button class="sign-out-btn" onclick="signOut()">Sign out</button>
    </div>
  </div>
  <div id="loading">Loading tools…</div>
  <div id="tools-content" style="display:none"></div>
</div>

<!-- Firebase compat SDK — NO defer/async (breaks auth on fresh load; Panso commit 88f03f9) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
(async function () {
  // ── 1. Fetch Firebase config from API ──────────────────────────────────
  let fbCfg;
  try {
    fbCfg = await fetch('/api/firebase-config').then(r => r.json());
  } catch (e) {
    document.getElementById('auth-error').textContent = 'Could not reach the server.';
    return;
  }
  firebase.initializeApp(fbCfg);
  const auth = firebase.auth();

  // ── 2. Auth state ──────────────────────────────────────────────────────
  auth.onAuthStateChanged(async (user) => {
    if (!user) {
      document.getElementById('auth-wall').style.display = 'flex';
      document.getElementById('app').style.display       = 'none';
      return;
    }
    document.getElementById('auth-wall').style.display = 'none';
    document.getElementById('app').style.display       = 'block';
    document.getElementById('user-email-lbl').textContent = user.email;

    // Get ID token, hit /api/me for grants
    let token, me;
    try {
      token = await user.getIdToken();
      me    = await fetch('/api/me', {
        headers: { 'Authorization': 'Bearer ' + token }
      }).then(r => r.json());
    } catch (e) {
      document.getElementById('loading').textContent = 'Error loading user profile.';
      return;
    }
    renderTools(me);
  });

  // ── 3. Sign-in button ──────────────────────────────────────────────────
  document.getElementById('sign-in-btn').addEventListener('click', async () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
      await auth.signInWithPopup(provider);
    } catch (e) {
      document.getElementById('auth-error').textContent =
        e.code === 'auth/popup-closed-by-user' ? '' : (e.message || 'Sign-in failed.');
    }
  });

  window.signOut = async () => {
    await auth.signOut();
  };

  // ── 4. Tool grid ───────────────────────────────────────────────────────
  // lead = Panso config.json departments[].manager_email, as of 2026-06-27
  const TOOLS = [
    {
      name:  'Incentive Calculator',
      dept:  'MG - Finance',
      grant: 'dept::MG - Finance',
      url:   '/tools/incentive.html',
      live:  true,
      group: 'MG - Finance',
      lead:  'Norisa (norisa@mata.ph)',
    },
    {
      name:  'HR Calendar',
      dept:  'MG - HR',
      grant: 'dept::MG - HR',
      url:   '/tools/calendar.html',
      live:  true,
      group: 'MG - HR',
      lead:  'Arielle Mancia (arielle.mancia@mata.ph)',
    },
    {
      name:  'Interns Dashboard',
      dept:  'MG - HR',
      grant: 'dept::MG - HR',
      url:   '/tools/interns.html',
      live:  true,
      group: 'MG - HR',
      lead:  'Arielle Mancia (arielle.mancia@mata.ph)',
    },
    {
      name:  'Intern Allowance Matrix',
      dept:  'MG - HR',
      grant: 'dept::MG - HR',
      url:   '/tools/intern-allowance-matrix.html',
      live:  true,
      group: 'MG - HR',
      lead:  'Arielle Mancia (arielle.mancia@mata.ph)',
    },
    {
      name:     'Policies',
      dept:     'All · everyone',
      grant:    null,
      public:   true,
      external: true,
      url:      'https://mata-policies.web.app',
      live:     true,
      group:    'Company-wide',
      lead:     null,
    },
    {
      name:  'Workload Matrix',
      dept:  'MT - Ops',
      grant: 'dept::MT - Operations (Domestic)',
      url:   '/tools/workload-matrix.html',
      live:  true,
      group: 'MT - Operations (Domestic)',
      lead:  'Jemar (jemar@mata.ph)',
    },
    {
      name:  'Agenda Trail',
      dept:  'All departments',
      grant: null,
      url:   null,
      live:  false,
      group: 'Company-wide',
      lead:  null,
    },
    {
      name:   'Dept Documents',
      dept:   'All departments',
      grant:  null,
      public: true,   // visible to all signed-in users; data gated server-side by dept:: grant
      url:    '/tools/dept-documents.html',
      live:   true,
      group:  'Company-wide',
      lead:   null,
    },
  ];

  function canSee(tool, me) {
    if (tool.public) return true;            // public:true → visible to all signed-in users
    if (me.is_admin) return true;
    if (!tool.grant) return false;           // grant=null → admin-only until scoped
    return (me.grants || []).includes(tool.grant);
  }

  function renderTools(me) {
    document.getElementById('loading').style.display = 'none';
    const wrap = document.getElementById('tools-content');
    wrap.style.display = 'block';

    const visible = TOOLS.filter(t => canSee(t, me));
    if (!visible.length) {
      wrap.innerHTML = '<p style="color:var(--muted)">No tools are assigned to your account yet. Contact ryan@mata.ph to request access.</p>';
      return;
    }

    const GROUP_ORDER = ['MG - Finance', 'MG - HR', 'MT - Operations (Domestic)', 'Company-wide'];
    let html = '';
    GROUP_ORDER.forEach(group => {
      const tools = visible.filter(t => t.group === group);
      if (!tools.length) return;
      const lead = tools[0].lead;
      const leadSpan = group === 'Company-wide'
        ? '<span class="group-header-lead">· everyone</span>'
        : '<span class="group-header-lead">· Lead: ' + esc(lead) + '</span>';
      const cards = tools.map(t => {
        const badge = t.live
          ? '<span class="tool-badge live">Live</span>'
          : '<span class="tool-badge">Coming soon</span>';
        if (t.live && t.url) {
          const isExt = t.external || /^https?:\/\//.test(t.url);
          const extAttrs = isExt ? ' target="_blank" rel="noopener noreferrer"' : '';
          return `<a class="tool-card" href="${t.url}"${extAttrs}>
          <div class="tool-name">${esc(t.name)}</div>
          ${badge}
        </a>`;
        }
        return `<div class="tool-card coming-soon">
          <div class="tool-name">${esc(t.name)}</div>
          ${badge}
        </div>`;
      }).join('');
      html += `
      <div class="group-header">
        <span class="group-header-name">${esc(group)}</span>
        ${leadSpan}
      </div>
      <div class="tools-grid">${cards}</div>`;
    });
    wrap.innerHTML = html;
  }

  function esc(s) {
    return (s || '').toString().replace(/[&<>"']/g,
      c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
})();
</script>
</body>
</html>
