steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/panso-ph/cloud-run-source-deploy/mata-tools-api'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'asia-southeast1-docker.pkg.dev/panso-ph/cloud-run-source-deploy/mata-tools-api'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - mata-tools-api
      - '--image=asia-southeast1-docker.pkg.dev/panso-ph/cloud-run-source-deploy/mata-tools-api'
      - '--region=asia-southeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--add-volume=name=panso-data,type=cloud-storage,bucket=panso-ph-data,readonly=true'
      - '--add-volume-mount=volume=panso-data,mount-path=/data'
      - '--set-env-vars=PANSO_ROOT=/data,FIREBASE_PROJECT_ID=panso-ph,FIREBASE_API_KEY=FIREBASE_API_KEY_REMOVED,FIREBASE_AUTH_DOMAIN=panso-ph.firebaseapp.com,FIREBASE_STORAGE_BUCKET=panso-ph.firebasestorage.app,FIREBASE_MESSAGING_SENDER_ID=965834933814,FIREBASE_APP_ID=1:965834933814:web:44debe4e06d118164bba97'
      - '--service-account=panso-api@panso-ph.iam.gserviceaccount.com'

images:
  - 'asia-southeast1-docker.pkg.dev/panso-ph/cloud-run-source-deploy/mata-tools-api'
